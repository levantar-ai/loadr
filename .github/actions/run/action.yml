name: Run loadr
description: >-
  Run a loadr test plan in CI. Installs loadr, runs the plan, writes a JUnit XML
  report and JSON summary, and fails the job when a threshold is breached.
author: levantar-ai

branding:
  icon: activity
  color: purple

inputs:
  plan:
    description: Path to the loadr test plan (YAML).
    required: true
  version:
    description: 'loadr version to install (tag like "v1.21.5", or "latest").'
    required: false
    default: latest
  bin:
    description: >-
      Path to a preinstalled loadr binary. When set, the download is skipped and
      this binary is used (handy for self-hosted runners that already ship loadr).
    required: false
    default: ''
  junit:
    description: Path to write the JUnit XML report.
    required: false
    default: loadr-junit.xml
  summary:
    description: Path to write the JSON summary export.
    required: false
    default: loadr-summary.json
  args:
    description: Extra arguments passed verbatim to `loadr run`.
    required: false
    default: ''
  fail-on-threshold:
    description: >-
      When 'true' (default) a breached threshold fails the step. Set 'false' to
      record results without failing the job.
    required: false
    default: 'true'

outputs:
  passed:
    description: "'true' when every threshold passed and the run was not aborted."
    value: ${{ steps.run.outputs.passed }}
  exit-code:
    description: The exit code from `loadr run`.
    value: ${{ steps.run.outputs.exit_code }}
  junit:
    description: Path to the JUnit XML report.
    value: ${{ inputs.junit }}
  summary:
    description: Path to the JSON summary.
    value: ${{ inputs.summary }}

runs:
  using: composite
  steps:
    # Install is inlined (not a nested `uses:`) so this action is self-contained
    # and works at any ref — including before it lands on the default branch.
    - name: Install loadr
      shell: bash
      env:
        LOADR_VERSION: ${{ inputs.version }}
        LOADR_PREINSTALLED: ${{ inputs.bin }}
        GH_TOKEN: ${{ github.token }}
      run: |
        set -euo pipefail
        repo="levantar-ai/loadr"
        # A preinstalled binary short-circuits the download.
        if [ -n "${LOADR_PREINSTALLED}" ]; then
          if [ ! -x "${LOADR_PREINSTALLED}" ]; then
            echo "::error::bin '${LOADR_PREINSTALLED}' is not an executable file"; exit 1
          fi
          echo "Using preinstalled loadr at ${LOADR_PREINSTALLED}"
          echo "$(cd "$(dirname "${LOADR_PREINSTALLED}")" && pwd)" >> "$GITHUB_PATH"
          "${LOADR_PREINSTALLED}" --version || true
          exit 0
        fi
        os="$(uname -s)"; arch="$(uname -m)"
        case "$os" in
          Linux)  triple_os="unknown-linux-gnu"; ext="tar.gz" ;;
          Darwin) triple_os="apple-darwin";       ext="tar.gz" ;;
          MINGW*|MSYS*|CYGWIN*|Windows_NT) triple_os="pc-windows-msvc"; ext="zip" ;;
          *) echo "::error::unsupported OS: $os"; exit 1 ;;
        esac
        case "$arch" in
          x86_64|amd64) triple_arch="x86_64" ;;
          arm64|aarch64) triple_arch="aarch64" ;;
          *) echo "::error::unsupported arch: $arch"; exit 1 ;;
        esac
        if [ "$triple_os" = "pc-windows-msvc" ]; then triple_arch="x86_64"; fi
        asset="loadr-${triple_arch}-${triple_os}.${ext}"
        if [ "${LOADR_VERSION}" = "latest" ] || [ -z "${LOADR_VERSION}" ]; then
          base="https://github.com/${repo}/releases/latest/download"
          tag="$(gh release view --repo "$repo" --json tagName -q .tagName 2>/dev/null || echo latest)"
        else
          tag="${LOADR_VERSION}"
          base="https://github.com/${repo}/releases/download/${tag}"
        fi
        echo "Installing loadr ${tag} (${asset})"
        dest="${RUNNER_TEMP:-/tmp}/loadr-install"
        mkdir -p "$dest"
        curl --fail --location --retry 3 --silent --show-error -o "${dest}/${asset}" "${base}/${asset}"
        if [ "$ext" = "zip" ]; then
          unzip -o -q "${dest}/${asset}" -d "$dest"
          bin="$(find "$dest" -name 'loadr.exe' -type f | head -n1)"
        else
          tar -xzf "${dest}/${asset}" -C "$dest"
          bin="$(find "$dest" -name 'loadr' -type f | head -n1)"
        fi
        if [ -z "$bin" ]; then echo "::error::loadr binary not found in $asset"; exit 1; fi
        chmod +x "$bin" || true
        echo "$(dirname "$bin")" >> "$GITHUB_PATH"
        "$bin" --version || true

    - id: run
      shell: bash
      env:
        PLAN: ${{ inputs.plan }}
        JUNIT: ${{ inputs.junit }}
        SUMMARY: ${{ inputs.summary }}
        EXTRA: ${{ inputs.args }}
        FAIL_ON_THRESHOLD: ${{ inputs.fail-on-threshold }}
      run: |
        set -uo pipefail
        # shellcheck disable=SC2086
        loadr run "$PLAN" \
          --junit "$JUNIT" \
          --summary-export "$SUMMARY" \
          $EXTRA
        code=$?
        echo "exit_code=${code}" >> "$GITHUB_OUTPUT"
        if [ "$code" -eq 0 ]; then
          echo "passed=true" >> "$GITHUB_OUTPUT"
        else
          echo "passed=false" >> "$GITHUB_OUTPUT"
        fi
        if [ "$code" -ne 0 ] && [ "$FAIL_ON_THRESHOLD" = "true" ]; then
          echo "::error::loadr run failed (exit ${code}); see ${JUNIT}"
          exit "$code"
        fi

name: Acceptance

# End-to-end: build the binary, stand up the real backend services
# (Redis, go-httpbin, a gRPC greeter, WS/SSE/TCP/UDP echo + a demo HTTP app)
# and run every example through loadr against them.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: acceptance-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  examples:
    name: run all examples (real services)
    runs-on: ubuntu-latest
    # Healthy runs are ~25-30m; a stuck service has hung this ~3h. Fail fast.
    timeout-minutes: 45
    steps:
      - uses: step-security/harden-runner@f4a75cfd619ee5ce8d5b864b0d183aff3c69b55a # v2.13.1
        with: { egress-policy: audit }
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with: { toolchain: stable }
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Build loadr
        run: cargo build --release -p loadr-cli --locked
      - name: Run examples against the real-service stack
        # Step-level cap so a service that never comes up fails here, not after
        # the whole job's budget.
        timeout-minutes: 30
        env:
          LOADR: ${{ github.workspace }}/target/release/loadr
        run: bash scripts/run-examples.sh

name: Benchmark

# Compares loadr against k6, JMeter, Gatling and Locust over the same Dockerized
# target. Manually triggered (it runs 5 tools back-to-back and is not cheap);
# results are posted to the run summary and uploaded as an artifact.

on:
  workflow_dispatch:
    inputs:
      vus:
        description: 'Concurrent virtual users'
        default: '50'
      duration:
        description: 'Run duration per tool (seconds)'
        default: '30'
      tools:
        description: 'Tools to run (space-separated)'
        default: 'loadr k6 jmeter gatling locust'

permissions:
  contents: read

jobs:
  benchmark:
    name: loadr vs k6 · JMeter · Gatling · Locust
    runs-on: ubuntu-latest
    steps:
      - uses: step-security/harden-runner@f4a75cfd619ee5ce8d5b864b0d183aff3c69b55a # v2.13.1
        with: { egress-policy: audit }
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
        with: { toolchain: stable }
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Build loadr (release, the binary under test)
        run: cargo build --release -p loadr-cli

      # Cache Gatling's Maven dependencies between runs.
      - uses: actions/cache@1bd1e32a3bdc45362d1e726936510720a7c30a57 # v4
        with:
          path: benchmarks/.cache-m2
          key: bench-m2-${{ hashFiles('benchmarks/scenarios/gatling/pom.xml') }}

      - name: Run the benchmark suite
        working-directory: benchmarks
        env:
          LOADR_BIN: ${{ github.workspace }}/target/release/loadr
          TOOLS: ${{ github.event.inputs.tools }}
          BENCH_VUS: ${{ github.event.inputs.vus }}
          BENCH_DURATION: ${{ github.event.inputs.duration }}s
          BENCH_DURATION_S: ${{ github.event.inputs.duration }}
        run: ./run.sh

      - name: Publish results to the run summary
        if: always()
        run: |
          {
            echo "## Benchmark — ${{ github.event.inputs.vus }} VUs · ${{ github.event.inputs.duration }}s · GET /json"
            echo
            cat benchmarks/results/summary.md 2>/dev/null || echo "_no results_"
          } >> "$GITHUB_STEP_SUMMARY"

      - uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4
        if: always()
        with:
          name: benchmark-results
          path: benchmarks/results
          if-no-files-found: ignore

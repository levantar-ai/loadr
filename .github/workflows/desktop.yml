name: Desktop

on:
  push:
    branches: [main]
    paths: ['desktop/**', 'crates/loadr-config/**', 'crates/loadr-cli/**', '.github/workflows/desktop.yml']
  pull_request:
    paths: ['desktop/**', 'crates/loadr-config/**', 'crates/loadr-cli/**', '.github/workflows/desktop.yml']

permissions:
  contents: read

jobs:
  check:
    name: typecheck · lint · unit + round-trip
    runs-on: ubuntu-latest
    steps:
      - uses: step-security/harden-runner@f4a75cfd619ee5ce8d5b864b0d183aff3c69b55a # v2.13.1
        with: { egress-policy: audit }
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
        with: { toolchain: stable }
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - run: cargo build -p loadr-cli
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4
        with: { node-version: 22, cache: npm, cache-dependency-path: desktop/package-lock.json }
      - run: npm ci
        working-directory: desktop
      - run: npm run typecheck
        working-directory: desktop
      - run: npm run lint
        working-directory: desktop
      - name: Unit + round-trip tests
        working-directory: desktop
        env:
          LOADR_BIN: ${{ github.workspace }}/target/debug/loadr
        run: npm test

  e2e:
    name: acceptance (Playwright-for-Electron, xvfb)
    runs-on: ubuntu-latest
    steps:
      - uses: step-security/harden-runner@f4a75cfd619ee5ce8d5b864b0d183aff3c69b55a # v2.13.1
        with: { egress-policy: audit }
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
        with: { toolchain: stable }
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - run: cargo build -p loadr-cli
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4
        with: { node-version: 22, cache: npm, cache-dependency-path: desktop/package-lock.json }
      - run: npm ci
        working-directory: desktop
      - run: npm run build
        working-directory: desktop
      - name: Install xvfb + Electron runtime libs
        run: sudo apt-get update && sudo apt-get install -y xvfb libnss3 libgbm1 libgtk-3-0 libasound2t64
      - name: Acceptance suite (headless)
        working-directory: desktop
        env:
          LOADR_BIN: ${{ github.workspace }}/target/debug/loadr
        run: xvfb-run -a npm run e2e
      - uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4
        if: failure()
        with: { name: playwright-report, path: desktop/playwright-report, retention-days: 7 }

  package:
    name: package (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
        with: { toolchain: stable }
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Build loadr (release, bundled with the app)
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "macOS" ]; then
            # DMGs ship for both arches from one runner — cross-build both so the
            # beforePack hook can stage the matching binary (avoids EBADARCH).
            rustup target add x86_64-apple-darwin aarch64-apple-darwin
            cargo build --release -p loadr-cli --target x86_64-apple-darwin
            cargo build --release -p loadr-cli --target aarch64-apple-darwin
          else
            cargo build --release -p loadr-cli
          fi
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4
        with: { node-version: 22, cache: npm, cache-dependency-path: desktop/package-lock.json }
      - run: npm ci
        working-directory: desktop
      - name: Package (signing/notarization apply only when secrets are present)
        working-directory: desktop
        # stage-loadr.mjs picks the platform-correct ../target/release/loadr[.exe].
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: npm run package
      - uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4
        with:
          name: loadr-desktop-${{ matrix.os }}
          path: |
            desktop/dist/*.dmg
            desktop/dist/*.zip
            desktop/dist/*.exe
            desktop/dist/*.AppImage
            desktop/dist/*.deb
          if-no-files-found: ignore

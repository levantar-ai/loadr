name: Major-version tag

# Keep the floating major-version tag (e.g. `v1`) current so
# `uses: levantar-ai/loadr@v1` (the GitHub Action) resolves — the convention
# every published Action follows.
#
# The major NUMBER tracks the latest CLI release (v1.22.2 -> v1), but the tag
# POINTS at the default-branch head, because that's where the action definition
# (action.yml + .github/actions/**) lives — usually ahead of the last release.
# The CLI binary is fetched at run time via the action's `version:` input, so
# the tag must follow the action code, not the release commit.
#
# Two triggers, one behaviour:
#   - release: published  → fires after the CLI Release publishes a new
#     `v*` release (semantic-release uses PAT_TOKEN, so the event cascades).
#   - workflow_dispatch    → manual bootstrap / repair from the Actions tab.
#
# Desktop (`desktop-v*`) and plugin (`plugin-v*`) releases also raise the event;
# they're filtered out — only `v<major>.<minor>.<patch>` CLI tags move the tag.
# The enterprise forces GITHUB_TOKEN read-only, so the API write uses PAT_TOKEN.

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: major-tag
  cancel-in-progress: false

jobs:
  retag:
    name: move v<major> to the action code on the default branch
    runs-on: ubuntu-latest
    steps:
      - uses: step-security/harden-runner@f4a75cfd619ee5ce8d5b864b0d183aff3c69b55a # v2.13.1
        with:
          egress-policy: audit
      - name: Move major-version tag
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
          REPO: ${{ github.repository }}
          # On a release event this is the published tag; empty on dispatch.
          EVENT_TAG: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail

          # A release event for a non-CLI train (desktop-v*, plugin-v*) is a no-op.
          if [ -n "${EVENT_TAG}" ] && ! printf '%s' "${EVENT_TAG}" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::notice::release ${EVENT_TAG} is not a CLI v* release; nothing to do"
            exit 0
          fi

          # Source of truth: the newest CLI v<x.y.z> release. (Resolving it works
          # for both triggers and stays correct even if events arrive out of order.)
          latest="$(gh api "repos/${REPO}/releases?per_page=100" \
            --jq '[.[] | select(.tag_name | test("^v[0-9]+\\.[0-9]+\\.[0-9]+$"))]
                  | sort_by(.created_at) | last | .tag_name')"
          if [ -z "${latest}" ] || [ "${latest}" = "null" ]; then
            echo "::error::no CLI v<x.y.z> release found"; exit 1
          fi

          ver="${latest#v}"; major="v${ver%%.*}"   # v1.22.2 -> v1

          # Point the major tag at the DEFAULT BRANCH head, not the release
          # commit. `uses: levantar-ai/loadr@vN` resolves the action definition
          # (action.yml + .github/actions/**), which lives on the default branch
          # and is usually ahead of the last CLI release. The CLI *binary* is
          # fetched at run time via the action's `version:` input (default:
          # latest release), so the tag must track the action code, not the
          # release commit — otherwise `@vN` 404s whenever the action changed
          # after the last release.
          default_branch="$(gh api "repos/${REPO}" --jq '.default_branch')"
          sha="$(gh api "repos/${REPO}/git/ref/heads/${default_branch}" --jq '.object.sha')"
          echo "major ${major} -> ${default_branch}@${sha} (latest release ${latest})"

          # Create or force-move the major tag via the Git Refs API. The API path
          # is NOT subject to the PAT 'workflow'-scope rule that rejects a plain
          # `git push` of any ref whose tree touches .github/workflows/** — the
          # same reason semantic-release creates tags through the API, not git.
          if cur="$(gh api "repos/${REPO}/git/ref/tags/${major}" --jq '.object.sha' 2>/dev/null)"; then
            if [ "${cur}" = "${sha}" ]; then
              echo "::notice::${major} already points at ${sha}; nothing to do"; exit 0
            fi
            gh api -X PATCH "repos/${REPO}/git/refs/tags/${major}" \
              -f sha="${sha}" -F force=true >/dev/null
          else
            gh api -X POST "repos/${REPO}/git/refs" \
              -f ref="refs/tags/${major}" -f sha="${sha}" >/dev/null
          fi
          echo "::notice::moved ${major} -> ${latest} (${sha})"

name: Major-version tag

# Keep the floating major-version tag (e.g. `v1`) pointing at the newest CLI
# release, so `uses: levantar-ai/loadr@v1` (the GitHub Action) resolves and
# tracks patches/minors — the convention every published Action follows.
#
# Two triggers, one behaviour: re-point `v<major>` at the latest CLI `v<x.y.z>`
# release.
#   - release: published  → fires after the CLI Release publishes a new
#     `v*` release (semantic-release uses PAT_TOKEN, so the event cascades).
#   - workflow_dispatch    → manual bootstrap / repair from the Actions tab.
#
# Desktop (`desktop-v*`) and plugin (`plugin-v*`) releases also raise the event;
# they're filtered out — only `v<major>.<minor>.<patch>` CLI tags move the tag.
# The enterprise forces GITHUB_TOKEN read-only, so the tag push uses PAT_TOKEN.

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: major-tag
  cancel-in-progress: false

jobs:
  retag:
    name: move v<major> to the latest CLI release
    runs-on: ubuntu-latest
    steps:
      - uses: step-security/harden-runner@f4a75cfd619ee5ce8d5b864b0d183aff3c69b55a # v2.13.1
        with:
          egress-policy: audit
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN }}
      - name: Move major-version tag
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
          REPO: ${{ github.repository }}
          # On a release event this is the published tag; empty on dispatch.
          EVENT_TAG: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail

          # A release event for a non-CLI train (desktop-v*, plugin-v*) is a no-op.
          if [ -n "${EVENT_TAG}" ] && ! printf '%s' "${EVENT_TAG}" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::notice::release ${EVENT_TAG} is not a CLI v* release; nothing to do"
            exit 0
          fi

          # Source of truth: the newest CLI v<x.y.z> release. (Resolving it works
          # for both triggers and stays correct even if events arrive out of order.)
          latest="$(gh api "repos/${REPO}/releases?per_page=100" \
            --jq '[.[] | select(.tag_name | test("^v[0-9]+\\.[0-9]+\\.[0-9]+$"))]
                  | sort_by(.created_at) | last | .tag_name')"
          if [ -z "${latest}" ] || [ "${latest}" = "null" ]; then
            echo "::error::no CLI v<x.y.z> release found"; exit 1
          fi

          major="v${latest#v}"; major="v${major%%.*}"   # v1.22.2 -> v1
          echo "Latest CLI release: ${latest} -> major tag ${major}"

          git fetch --force --tags origin
          if ! git rev-parse -q --verify "refs/tags/${latest}" >/dev/null; then
            echo "::error::tag ${latest} not found in the repo"; exit 1
          fi

          if [ "$(git rev-parse -q --verify "refs/tags/${major}" || true)" = "$(git rev-parse "refs/tags/${latest}")" ]; then
            echo "::notice::${major} already points at ${latest}; nothing to do"
            exit 0
          fi

          git tag -f "${major}" "${latest}"
          git push --force origin "refs/tags/${major}"
          echo "::notice::moved ${major} -> ${latest}"

name: Publish to crates.io

# Manual, deliberate publish of the loadr workspace crates to crates.io.
# Defaults to a dry run; set `confirm` to "publish" to actually upload.
#
# Crates are published in dependency order. The step is idempotent (an
# already-published version is skipped) and backs off on crates.io's
# new-crate rate limit, so a partial run can simply be re-triggered.

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "publish" to upload for real. Anything else = dry run.'
        type: string
        required: false
        default: "dry-run"

permissions:
  contents: read

concurrency:
  group: publish-crates
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  publish:
    name: publish workspace crates
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: step-security/harden-runner@f4a75cfd619ee5ce8d5b864b0d183aff3c69b55a # v2.13.1
        with: { egress-policy: audit }
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with: { toolchain: stable, targets: wasm32-wasip2 }
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Publish (dependency order)
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_TOKEN }}
          CONFIRM: ${{ inputs.confirm }}
        run: |
          set -uo pipefail

          # Topological order: every crate appears after all of its loadr-*
          # dependencies. loadr-testserver is publish=false (dev-only) and is
          # intentionally absent.
          ORDER=(
            loadr-config
            loadr-core
            loadr-convert
            loadr-js
            loadr-outputs
            loadr-plugin-api
            loadr-protocols
            loadr-plugin-webui
            loadr-agent
            loadr-browser
            loadr-cli
          )

          REAL=0
          if [ "${CONFIRM}" = "publish" ]; then REAL=1; fi
          if [ "$REAL" = "1" ]; then
            echo "::notice::REAL publish run — crates will be uploaded to crates.io"
            if [ -z "${CARGO_REGISTRY_TOKEN:-}" ]; then
              echo "::error::CRATES_TOKEN secret is not set"; exit 1
            fi
          else
            echo "::notice::DRY RUN — validating packaging only (set confirm=publish to upload)"
          fi

          publish_one() {
            local c="$1"
            local args="--package $c --locked"
            [ "$REAL" = "1" ] || args="$args --dry-run"
            local try=0
            while : ; do
              try=$((try+1))
              echo "::group::cargo publish $args (attempt $try)"
              local out rc
              out=$(cargo publish $args 2>&1); rc=$?
              echo "$out" | tail -n 25
              echo "::endgroup::"
              [ "$rc" = "0" ] && { echo "::notice::$c — ok"; return 0; }

              # Already on crates.io (idempotent re-run).
              if echo "$out" | grep -qiE 'already (exists|uploaded)|already been (uploaded|published)|crate version .* is already'; then
                echo "::notice::$c — already published, skipping"; return 0
              fi
              # Dry run can't resolve not-yet-published sibling crates; that's expected.
              if [ "$REAL" = "0" ] && echo "$out" | grep -qiE 'no matching package named .?loadr-'; then
                echo "::notice::$c — dry run ok (sibling deps not yet on registry)"; return 0
              fi
              # New-crate rate limit: back off and retry.
              if echo "$out" | grep -qiE 'rate limit|429|too many requests'; then
                if [ "$try" -ge 14 ]; then echo "::error::$c still rate-limited after $try attempts"; return 1; fi
                echo "::warning::$c — rate limited; sleeping 660s before retry (attempt $try)"
                sleep 660; continue
              fi
              echo "::error::$c — publish failed (non-retryable, see log above)"; return 1
            done
          }

          for c in "${ORDER[@]}"; do
            publish_one "$c" || exit 1
          done
          echo "::notice::all crates processed"

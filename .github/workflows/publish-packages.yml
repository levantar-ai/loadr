name: Publish package manifests

# After a CLI release (a `v*` tag), regenerate the Homebrew formula and Scoop
# manifest from the release's SHA256SUMS and commit them back to main. Desktop
# releases (`desktop-v*`) are ignored. The commit touches only Formula/ + bucket/
# (paths-ignored by Release) and is marked [skip ci], so it cannot loop.

on:
  release:
    types: [released]

permissions:
  contents: read

jobs:
  manifests:
    name: refresh Homebrew + Scoop manifests
    if: startsWith(github.event.release.tag_name, 'v')
    runs-on: ubuntu-latest
    steps:
      - uses: step-security/harden-runner@f4a75cfd619ee5ce8d5b864b0d183aff3c69b55a # v2.13.1
        with: { egress-policy: audit }
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          ref: main
          token: ${{ secrets.PAT_TOKEN }}
      - name: Render manifests for ${{ github.event.release.tag_name }}
        run: ./packaging/render-packages.sh "${{ github.event.release.tag_name }}"
      - name: Commit if changed
        run: |
          git config user.name "loadr-bot"
          git config user.email "noreply@loadr.io"
          if git diff --quiet -- Formula/loadr.rb bucket/loadr.json; then
            echo "manifests already up to date"
          else
            git add Formula/loadr.rb bucket/loadr.json
            git commit -m "chore(packaging): loadr ${{ github.event.release.tag_name }} [skip ci]"
            git push origin main
          fi

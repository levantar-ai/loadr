name: Publish plugins

# Build every loadr plugin cdylib for all shipped targets, publish the archives
# (with SHA-256 + SLSA provenance) to a GitHub Release, and refresh the plugin
# index (plugins/index.json) that `loadr plugin install <name>` resolves.
#
# Triggers:
#   * a plugin release tag  `plugin-v<x.y.z>`  (real release)
#   * workflow_dispatch                        (dry run by default; build+package
#                                                only, no Release, no index push)
#
# The enterprise forces GITHUB_TOKEN to read-only, so the Release upload and the
# index commit-back use the org PAT secret, exactly like release.yml.

on:
  push:
    tags:
      - "plugin-v*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Build + package only; skip the GitHub Release and index push. "false" to publish for real.'
        type: boolean
        required: false
        default: true
      tag:
        description: "Release tag to publish under when dry_run is false (e.g. plugin-v1.0.0)."
        type: string
        required: false
        default: ""

permissions:
  contents: read

concurrency:
  group: publish-plugins
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  # ---------------------------------------------------------------------------
  # Resolve run parameters and discover the plugin crates to build.
  # A "plugin crate" is plugins/loadr-plugin-* that ships a plugin.toml AND
  # builds a cdylib (crate-type = ["cdylib"]). The webui service crate has no
  # plugin.toml and is intentionally excluded.
  # ---------------------------------------------------------------------------
  plan:
    name: Plan
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.discover.outputs.matrix }}
      any: ${{ steps.discover.outputs.any }}
      dry_run: ${{ steps.params.outputs.dry_run }}
      tag: ${{ steps.params.outputs.tag }}
    steps:
      - uses: step-security/harden-runner@f4a75cfd619ee5ce8d5b864b0d183aff3c69b55a # v2.13.1
        with: { egress-policy: audit }
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - name: Resolve params
        id: params
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "push" ]; then
            # Tag push is always a real publish.
            echo "dry_run=false" >> "$GITHUB_OUTPUT"
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            dry="${{ inputs.dry_run }}"
            echo "dry_run=${dry}" >> "$GITHUB_OUTPUT"
            tag="${{ inputs.tag }}"
            if [ "$dry" = "false" ] && [ -z "$tag" ]; then
              echo "::error::dry_run=false requires a 'tag' input (e.g. plugin-v1.0.0)"; exit 1
            fi
            echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          fi
      - name: Discover plugin crates
        id: discover
        shell: bash
        run: |
          set -euo pipefail
          entries='[]'
          for dir in plugins/loadr-plugin-*; do
            [ -f "$dir/plugin.toml" ] || continue
            [ -f "$dir/Cargo.toml" ] || continue
            grep -q 'crate-type' "$dir/Cargo.toml" \
              && grep -q 'cdylib' "$dir/Cargo.toml" || continue
            crate="$(grep -E '^name[[:space:]]*=' "$dir/Cargo.toml" | head -1 \
              | sed -E 's/^name[[:space:]]*=[[:space:]]*"([^"]*)".*/\1/')"
            name="$(grep -E '^[[:space:]]*name[[:space:]]*=' "$dir/plugin.toml" | head -1 \
              | sed -E 's/^[^=]*=[[:space:]]*"([^"]*)".*/\1/')"
            echo "found: $dir (crate=$crate name=$name)"
            entries="$(jq -c --arg d "$dir" --arg c "$crate" --arg n "$name" \
              '. + [{dir:$d, crate:$c, name:$n}]' <<<"$entries")"
          done
          n="$(jq 'length' <<<"$entries")"
          echo "matrix={\"include\":${entries}}" >> "$GITHUB_OUTPUT"
          if [ "$n" -gt 0 ]; then any=true; else any=false; fi
          echo "any=${any}" >> "$GITHUB_OUTPUT"
          echo "::notice::discovered ${n} plugin crate(s)"

  # ---------------------------------------------------------------------------
  # Build + package each plugin for each of the 5 shipped targets. Mirrors the
  # cross/target setup from release.yml.
  # ---------------------------------------------------------------------------
  build:
    name: ${{ matrix.plugin.name }} ${{ matrix.target.triple }}
    needs: plan
    if: needs.plan.outputs.any == 'true'
    runs-on: ${{ matrix.target.os }}
    permissions:
      id-token: write # provenance attestation
      attestations: write
      contents: read
    strategy:
      fail-fast: false
      matrix:
        plugin: ${{ fromJson(needs.plan.outputs.matrix).include }}
        # GitHub computes the cross product of `plugin` x `target` automatically.
        target:
          - { triple: x86_64-unknown-linux-gnu,  os: ubuntu-latest }
          - { triple: aarch64-unknown-linux-gnu, os: ubuntu-latest,  linker: aarch64-linux-gnu-gcc, apt: gcc-aarch64-linux-gnu }
          - { triple: x86_64-apple-darwin,        os: macos-latest }
          - { triple: aarch64-apple-darwin,       os: macos-latest }
          - { triple: x86_64-pc-windows-msvc,     os: windows-latest }
    env:
      NAME: ${{ matrix.plugin.name }}
      CRATE_DIR: ${{ matrix.plugin.dir }}
      TARGET: ${{ matrix.target.triple }}
    steps:
      - uses: step-security/harden-runner@f4a75cfd619ee5ce8d5b864b0d183aff3c69b55a # v2.13.1
        with: { egress-policy: audit }
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - name: Set release version
        if: needs.plan.outputs.tag != ''
        shell: bash
        # Strip the `plugin-v` prefix so the crate version matches the tag.
        run: |
          ver="$(printf '%s' '${{ needs.plan.outputs.tag }}' | sed -E 's/^plugin-v//')"
          if printf '%s' "$ver" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            bash scripts/set-version.sh "$ver"
          else
            echo "::notice::tag '${{ needs.plan.outputs.tag }}' has no x.y.z version; using crate version"
          fi
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: stable
          targets: ${{ matrix.target.triple }}
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: ${{ matrix.plugin.crate }}-${{ matrix.target.triple }}
      - name: Install cross linker
        if: matrix.target.apt != ''
        run: sudo apt-get update && sudo apt-get install -y ${{ matrix.target.apt }}
      - name: Build + package
        id: pkg
        shell: bash
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: ${{ matrix.target.linker }}
          CC_aarch64_unknown_linux_gnu: ${{ matrix.target.linker }}
        run: bash scripts/build-plugin.sh "$CRATE_DIR" "$TARGET" dist
      - name: Attest provenance
        continue-on-error: true
        uses: actions/attest-build-provenance@c074443f1aee8d4aeeae555aebba3282517141b2 # v2.2.3
        with:
          subject-path: dist/${{ matrix.plugin.name }}-${{ matrix.target.triple }}.tar.gz
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: plugin-${{ matrix.plugin.name }}-${{ matrix.target.triple }}
          path: dist/
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Real publish only: create/update the GitHub Release with all archives +
  # checksums, regenerate plugins/index.json, and commit it back to main so the
  # default index URL (raw.githubusercontent.com/.../main/plugins/index.json)
  # serves it. Skipped entirely on a dry run.
  # ---------------------------------------------------------------------------
  publish:
    name: Release + index
    needs: [plan, build]
    if: needs.plan.outputs.any == 'true' && needs.plan.outputs.dry_run == 'false'
    runs-on: ubuntu-latest
    steps:
      - uses: step-security/harden-runner@f4a75cfd619ee5ce8d5b864b0d183aff3c69b55a # v2.13.1
        with: { egress-policy: audit }
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN }}
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          pattern: plugin-*
          path: incoming
          merge-multiple: true
      - name: Assemble dist + checksums
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist && cp incoming/* dist/
          ( cd dist && sha256sum *.tar.gz > SHA256SUMS && cat SHA256SUMS )
      - name: Regenerate plugin index
        shell: bash
        env:
          RELEASE_TAG: ${{ needs.plan.outputs.tag }}
        run: bash scripts/gen-plugin-index.sh dist plugins/index.json
      - name: Create / update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
          TAG: ${{ needs.plan.outputs.tag }}
        shell: bash
        run: |
          set -euo pipefail
          if ! gh release view "$TAG" >/dev/null 2>&1; then
            gh release create "$TAG" --title "$TAG" \
              --notes "loadr plugin artifacts for $TAG (cdylibs + SHA-256 + SLSA provenance)."
          fi
          gh release upload "$TAG" \
            dist/*.tar.gz dist/*.tar.gz.sha256 dist/SHA256SUMS --clobber
      - name: Commit refreshed index to main
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
          TAG: ${{ needs.plan.outputs.tag }}
        shell: bash
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- plugins/index.json; then
            echo "::notice::plugins/index.json unchanged"; exit 0
          fi
          git add plugins/index.json
          git commit -m "chore(plugins): refresh index for ${TAG}

          Co-Authored-By: Claude Opus 4.8 (1M context) <noreply@anthropic.com>"
          git push origin HEAD:main

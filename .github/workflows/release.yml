name: Release

# semantic-release decides the next version from Conventional Commits, builds
# multi-platform binaries with SLSA provenance attestations, and publishes a
# GitHub Release with the binaries + SHA256 checksums.
#
# The enterprise forces GITHUB_TOKEN to read-only, so release steps that need
# write (tag, release, assets) use the org PAT secret, exactly like the other
# levantar-ai repos.

on:
  push:
    branches: [main]
    # Only the CLI/core train releases here. Changes confined to other trains
    # (desktop, plugins' workflows, site, benchmarks, docs) must NOT cut a CLI
    # release — they have their own pipelines. A push touching ANY non-ignored
    # path (crates/**, Cargo.*, shared code) still triggers a release as normal.
    paths-ignore:
      - 'desktop/**'
      - 'site/**'
      - 'benchmarks/**'
      - 'docs/**'
      - '.github/workflows/desktop-release.yml'
      - '.github/workflows/desktop.yml'
      - '.github/workflows/action-selftest.yml'
      - '.github/workflows/acceptance.yml'
      - '.github/workflows/benchmark.yml'
      - '.github/workflows/release.yml'
      - '.github/workflows/publish-packages.yml'
      - 'Formula/**'
      - 'bucket/**'
      - 'packaging/**'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  BIN: loadr

jobs:
  plan:
    name: Plan
    runs-on: ubuntu-latest
    outputs:
      release: ${{ steps.plan.outputs.release }}
      version: ${{ steps.plan.outputs.version }}
    steps:
      - uses: step-security/harden-runner@f4a75cfd619ee5ce8d5b864b0d183aff3c69b55a # v2.13.1
        with:
          egress-policy: audit
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN }}
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"
      - run: npm install --no-audit --no-fund
      - id: plan
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          set +e
          out="$(npx semantic-release --dry-run 2>&1)"
          echo "$out"
          ver="$(printf '%s\n' "$out" | grep -oiE 'next release version is [0-9]+\.[0-9]+\.[0-9]+' | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | head -1)"
          if [ -n "$ver" ]; then
            echo "release=true"  >> "$GITHUB_OUTPUT"
            echo "version=$ver"  >> "$GITHUB_OUTPUT"
            echo "::notice::Releasing v$ver"
          else
            echo "release=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No release due"
          fi

  build:
    name: build ${{ matrix.target }}
    needs: plan
    if: needs.plan.outputs.release == 'true'
    runs-on: ${{ matrix.os }}
    permissions:
      id-token: write       # for provenance attestation
      attestations: write
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - { target: x86_64-unknown-linux-gnu,  os: ubuntu-latest,  archive: tar.gz }
          - { target: aarch64-unknown-linux-gnu, os: ubuntu-latest,  archive: tar.gz, linker: aarch64-linux-gnu-gcc, apt: gcc-aarch64-linux-gnu }
          - { target: x86_64-apple-darwin,        os: macos-latest,   archive: tar.gz }
          - { target: aarch64-apple-darwin,       os: macos-latest,   archive: tar.gz }
          - { target: x86_64-pc-windows-msvc,     os: windows-latest, archive: zip }
    steps:
      - uses: step-security/harden-runner@f4a75cfd619ee5ce8d5b864b0d183aff3c69b55a # v2.13.1
        with:
          egress-policy: audit
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - name: Set release version
        shell: bash
        run: bash scripts/set-version.sh "${{ needs.plan.outputs.version }}"
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: stable
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: ${{ matrix.target }}
      - name: Install cross linker
        if: matrix.apt != ''
        run: sudo apt-get update && sudo apt-get install -y ${{ matrix.apt }}
      - name: Build
        shell: bash
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: ${{ matrix.linker }}
          CC_aarch64_unknown_linux_gnu: ${{ matrix.linker }}
        run: cargo build --release -p loadr-cli --target ${{ matrix.target }}
      - name: Package
        id: pkg
        shell: bash
        run: |
          name="${BIN}-${{ matrix.target }}"
          mkdir -p "stage/$name" dist
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            cp "target/${{ matrix.target }}/release/${BIN}.exe" "stage/$name/"
          else
            cp "target/${{ matrix.target }}/release/${BIN}" "stage/$name/"
          fi
          cp README.md LICENSE "stage/$name/" 2>/dev/null || true
          cp -r examples "stage/$name/"
          ( cd stage
            if [ "${{ matrix.archive }}" = "zip" ]; then 7z a -tzip "../dist/$name.zip" "$name" >/dev/null; asset="$name.zip";
            else tar czf "../dist/$name.tar.gz" "$name"; asset="$name.tar.gz"; fi
            cd ..
            if command -v sha256sum >/dev/null; then sha256sum "dist/$asset" | awk '{print $1}' > "dist/$asset.sha256";
            else shasum -a 256 "dist/$asset" | awk '{print $1}' > "dist/$asset.sha256"; fi
            echo "asset=$asset" >> "$GITHUB_OUTPUT" )
      - name: Attest provenance
        continue-on-error: true
        uses: actions/attest-build-provenance@c074443f1aee8d4aeeae555aebba3282517141b2 # v2.2.3
        with:
          subject-path: dist/${{ steps.pkg.outputs.asset }}
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: dist-${{ matrix.target }}
          path: dist/
          if-no-files-found: error

  release:
    name: semantic-release
    needs: [plan, build]
    if: needs.plan.outputs.release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: step-security/harden-runner@f4a75cfd619ee5ce8d5b864b0d183aff3c69b55a # v2.13.1
        with:
          egress-policy: audit
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN }}
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          pattern: dist-*
          path: incoming
          merge-multiple: true
      - name: Assemble dist + checksums
        run: |
          mkdir -p dist && cp incoming/* dist/
          ( cd dist && sha256sum *.tar.gz *.zip 2>/dev/null > SHA256SUMS && cat SHA256SUMS )
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"
      - run: npm install --no-audit --no-fund
      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: npx semantic-release

# gitleaks configuration — extends the full built-in ruleset.
# We only ADD an allowlist for known-fake fixture credentials so example
# files don't trip secret scanning; no detection rules are weakened.
[extend]
useDefault = true

[allowlist]
description = "Example fixtures and docs contain intentionally fake credentials"
paths = [
  '''examples/.*''',          # demo workloads + their CSV/JSON feeders (fake users/tokens)
  '''testsupport/.*''',       # in-process test servers
  '''.*_test\.rs''',
  '''crates/loadr-convert/src/har\.rs''',  # embedded fake HAR fixture for the unit tests
]
# Belt-and-braces: these placeholder values appear in examples/docs.
regexes = [
  '''demo-token''',
  '''demo-key''',
  '''correct-horse''',
  '''battery-staple''',
  '''hunter2''',
  '''letmein123''',
  '''tr0ub4dor''',
  # Fake CSRF/UUID tokens in the HAR convert fixtures (har.rs, example.har, and
  # earlier branch history of the from-har docs). Known-fake, not real secrets.
  '''c2a5f1e8-9b3d-4a6c-8e21-7f0d4b9a1c33''',
  '''3f2504e0-4f89-41d3-9a0c-0305e82c3301''',
]

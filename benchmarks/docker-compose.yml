# The benchmark target. Uses host networking so every load tool reaches it over
# the same path (http://localhost:18080) with no docker-proxy/NAT in the way —
# the load generator is the only variable. run.sh brings this up, then runs each
# tool container with `--network host` against the same address. (Host
# networking is Linux-only; the CI runners and local dev here are Linux.)
name: loadrbench

services:
  target:
    build: ./target
    image: loadr-bench-target:latest
    container_name: loadrbench-target
    network_mode: host
    environment:
      ADDR: ":18080"
    restart: unless-stopped

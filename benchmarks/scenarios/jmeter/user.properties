# Tuned JMeter properties for max throughput (see ../../CONFIGURATION.md).
# Passed via `-q user.properties`; heap is set via the image's JVM_XMS/JVM_XMX.

# Persist HTTP connections ACROSS thread-group iterations instead of tearing
# them down and re-handshaking each loop — the single biggest JMeter lever here
# (PFLB measured ~3.9x). The sampler already has Use-KeepAlive on.
httpclient.reset_state_on_thread_group_iteration=false

# Keep pooled connections alive; no idle timeout, no silent retries.
httpclient4.idletimeout=0
httpclient4.retrycount=0
httpclient4.time_to_live=600000

# Trim per-sample JTL work (we don't parse these fields).
jmeter.save.saveservice.subresults=false
jmeter.save.saveservice.assertions=false
jmeter.save.saveservice.response_data=false
jmeter.save.saveservice.url=false

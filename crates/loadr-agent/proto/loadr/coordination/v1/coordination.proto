// Coordination protocol between the loadr controller and its load agents.
//
// A single bidirectional stream carries everything: the agent registers,
// then heartbeats, metric deltas and run lifecycle events flow up while
// assignments, the synchronized start barrier and control commands flow down.

syntax = "proto3";

package loadr.coordination.v1;

service Coordination {
  rpc Session(stream AgentMessage) returns (stream ControllerMessage);
}

message AgentMessage {
  oneof msg {
    Register register = 1;
    Heartbeat heartbeat = 2;
    MetricsBatch metrics = 3;
    RunEvent event = 4;
  }
}

message Register {
  string agent_id = 1;
  string agent_name = 2;
  uint32 protocol_version = 3;
  string loadr_version = 4;
  uint32 cpu_cores = 5;
  map<string, string> labels = 6;
  // Set on reconnection when a run is still in flight (controller decides policy).
  string resume_run_id = 7;
}

message Heartbeat {
  uint64 active_vus = 1;
  double cpu_load = 2;
  string run_id = 3;
  string run_state = 4;
}

message MetricsBatch {
  string run_id = 1;
  // serde_json encoding of loadr_core::MetricsDelta.
  bytes delta_json = 2;
}

message RunEvent {
  string run_id = 1;
  // started | finished | failed | aborted
  string kind = 2;
  string detail = 3;
  // serde_json encoding of loadr_core::Summary (finished/aborted only).
  bytes summary_json = 4;
}

message ControllerMessage {
  oneof msg {
    Registered registered = 1;
    Assignment assignment = 2;
    Start start = 3;
    Control control = 4;
  }
}

message Registered {
  string controller_id = 1;
  uint32 protocol_version = 2;
  string message = 3;
}

message Assignment {
  string run_id = 1;
  bytes plan_yaml = 2;
  uint64 partition_index = 3;
  uint64 partition_count = 4;
  repeated DataFile files = 5;
  string env = 6;
}

message DataFile {
  string relative_path = 1;
  bytes content = 2;
}

// Synchronized start barrier.
message Start {
  string run_id = 1;
  int64 start_unix_ms = 2;
}

message Control {
  string run_id = 1;
  // stop | kill | pause | resume | scale
  string action = 2;
  string scenario = 3;
  uint64 value = 4;
}

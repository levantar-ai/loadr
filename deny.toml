[advisories]
version = 2
ignore = [
    # wasmtime-wasi (via loadr-plugin-api's WASM component runtime) — WASI
    # hard-link/rename bypass of FilePerms for the *destination* path.
    # NOT REACHABLE in loadr: WASM plugins are built with
    # `WasiCtxBuilder::new().build()` — no preopened directories, no network,
    # no env, no inherited stdio (crates/loadr-plugin-api/src/wasm.rs), so the
    # guest has no filesystem access at all for the bypass to apply. CVSS is
    # AV:L and is conditioned on preopened dirs we never grant. No patched
    # version exists in the compatible (45.x) range; revisit on the next
    # wasmtime major bump.
    "RUSTSEC-2026-0188", # wasmtime-wasi; unreachable (no WASI preopens)
    # Unmaintained transitive deps with no upgrade path yet. Advisory-only
    # (no known vulnerability); revisit when upstreams publish replacements.
    "RUSTSEC-2024-0014", # generational-arena (via the browser/chromiumoxide stack)
    "RUSTSEC-2024-0436", # paste (proc-macro, pulled in transitively)
    "RUSTSEC-2025-0134", # rustls-pemfile (superseded by rustls-pki-types)
    # `instant` is unmaintained (author recommends `web-time`). Advisory-only,
    # no known vulnerability. Reachable ONLY via the `loadr-plugin-rabbitmq`
    # workspace member: `lapin` 2.x unconditionally pulls its built-in
    # `async-reactor-trait` (-> async-io -> futures-lite -> fastrand 1 ->
    # instant) for its default reactor; lapin 2.x exposes no feature to drop it,
    # even though the plugin drives lapin on tokio at runtime. The loadr core
    # binary and every other crate are free of it. Revisit when lapin/async-rs
    # ships a release that gates the async-io reactor behind a feature.
    "RUSTSEC-2024-0384", # instant (transitive via lapin; loadr-plugin-rabbitmq only)
    # rsa (via sqlx-mysql) — Marvin timing side-channel. No safe upgrade exists
    # upstream yet. Only reachable for MySQL caching_sha2/sha256 password auth on
    # a non-TLS connection; load-test targets are operator-controlled. `rsa`
    # (and `sqlx-mysql`) now lives ONLY in the `loadr-plugin-mysql` workspace
    # member: that plugin enables `sqlx`'s `mysql` feature, which is the sole
    # source of `rsa`. The `loadr-plugin-postgres` plugin enables only the
    # `postgres` feature and is fully advisory-clean, as is the loadr core
    # binary. `rsa` still appears in this workspace-wide scan because the MySQL
    # plugin is a workspace member, which is expected. Revisit when RustCrypto/
    # RSA ships a constant-time release.
    "RUSTSEC-2023-0071", # rsa (transitive via sqlx-mysql; loadr-plugin-mysql only)
]

[bans]
multiple-versions = "warn"
wildcards = "deny"
# The workspace's own crates depend on each other by `path` with no version
# requirement (resolves to `*`). Permit wildcards for path deps only; crates.io
# deps still must be pinned.
allow-wildcard-paths = true

[licenses]
version = 2
# Allow common permissive licenses; this is a proprietary binary, deps must be permissive.
# Elastic-2.0 is loadr's own source license (workspace crates inherit it via license-file).
allow = ["MIT", "Apache-2.0", "Apache-2.0 WITH LLVM-exception", "BSD-2-Clause", "BSD-3-Clause", "ISC", "Unicode-3.0", "Zlib", "MPL-2.0", "CC0-1.0", "Unlicense", "CDLA-Permissive-2.0", "Elastic-2.0"]
confidence-threshold = 0.9
private = { ignore = true }

[sources]
unknown-registry = "deny"
unknown-git = "deny"

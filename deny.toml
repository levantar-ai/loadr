[advisories]
version = 2
ignore = []

[bans]
multiple-versions = "warn"
wildcards = "deny"

[licenses]
version = 2
# Allow common permissive licenses; this is a proprietary binary, deps must be permissive.
allow = ["MIT", "Apache-2.0", "Apache-2.0 WITH LLVM-exception", "BSD-2-Clause", "BSD-3-Clause", "ISC", "Unicode-3.0", "Zlib", "MPL-2.0", "CC0-1.0", "Unlicense"]
confidence-threshold = 0.9
private = { ignore = true }

[sources]
unknown-registry = "deny"
unknown-git = "deny"

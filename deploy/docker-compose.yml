# Full distributed stack: controller + 3 agents + Prometheus + Grafana.
#
#   docker compose -f deploy/docker-compose.yml up --build
#
# Then:
#   Web UI:     http://localhost:6464   (admin / loadr by default)
#   Grafana:    http://localhost:3000   (admin / admin)
#   Prometheus: http://localhost:9090
#
# Submit a test to the fleet:
#   loadr run --controller localhost:7625 examples/15-distributed.yaml

services:
  controller:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    image: loadr/loadr:latest
    command:
      - controller
      - --bind=0.0.0.0:7625
      - --ui-bind=0.0.0.0:6464
      - --ui-user=admin
      - --ui-password=loadr
      - --prometheus-listen=0.0.0.0:9091
    ports:
      - "7625:7625"   # coordination gRPC
      - "6464:6464"   # management web UI
      - "9091:9091"   # prometheus scrape endpoint
    healthcheck:
      disable: true   # distroless: no shell; Prometheus scraping acts as the health probe

  agent-1:
    image: loadr/loadr:latest
    depends_on: [controller]
    command: [agent, --join=controller:7625, --name=agent-1]
    restart: unless-stopped

  agent-2:
    image: loadr/loadr:latest
    depends_on: [controller]
    command: [agent, --join=controller:7625, --name=agent-2]
    restart: unless-stopped

  agent-3:
    image: loadr/loadr:latest
    depends_on: [controller]
    command: [agent, --join=controller:7625, --name=agent-3]
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.53.0
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:11.1.0
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"
    depends_on: [prometheus]

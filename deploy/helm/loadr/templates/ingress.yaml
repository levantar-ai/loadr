{{- if .Values.controller.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "loadr.fullname" . }}-ui
  labels:
    {{- include "loadr.labels" . | nindent 4 }}
  {{- with .Values.controller.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- with .Values.controller.ingress.className }}
  ingressClassName: {{ . }}
  {{- end }}
  {{- with .Values.controller.ingress.tls }}
  tls:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  rules:
    - host: {{ .Values.controller.ingress.host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "loadr.fullname" . }}-controller
                port: { name: http-ui }
{{- end }}

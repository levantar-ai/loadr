image:
  repository: ghcr.io/reaandrew/loadr
  tag: ""            # defaults to chart appVersion
  pullPolicy: IfNotPresent

controller:
  grpcPort: 7625
  uiPort: 6464
  metricsPort: 9091
  ui:
    username: admin
    password: change-me
    existingSecret: ""   # secret with keys `username` and `password`; overrides the above
  service:
    type: ClusterIP
  ingress:
    enabled: false
    className: ""
    host: loadr.example.com
    tls: []
    annotations: {}
  resources:
    requests: { cpu: 250m, memory: 256Mi }
    limits: { cpu: "2", memory: 1Gi }

agents:
  replicas: 3
  labels: {}           # forwarded to the controller as agent labels
  resources:
    requests: { cpu: "1", memory: 512Mi }
    limits: { cpu: "4", memory: 2Gi }
  nodeSelector: {}
  tolerations: []
  affinity: {}

serviceMonitor:
  enabled: false       # requires the Prometheus Operator
  interval: 5s

podAnnotations: {}
imagePullSecrets: []

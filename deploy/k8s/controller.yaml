apiVersion: apps/v1
kind: Deployment
metadata:
  name: loadr-controller
  namespace: loadr
  labels: { app.kubernetes.io/name: loadr, app.kubernetes.io/component: controller }
spec:
  replicas: 1
  selector:
    matchLabels: { app.kubernetes.io/name: loadr, app.kubernetes.io/component: controller }
  template:
    metadata:
      labels: { app.kubernetes.io/name: loadr, app.kubernetes.io/component: controller }
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9091"
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: controller
          image: ghcr.io/reaandrew/loadr:latest
          args:
            - controller
            - --bind=0.0.0.0:7625
            - --ui-bind=0.0.0.0:6464
            - --ui-user=$(LOADR_UI_USER)
            - --ui-password=$(LOADR_UI_PASSWORD)
            - --prometheus-listen=0.0.0.0:9091
          env:
            - name: LOADR_UI_USER
              valueFrom: { secretKeyRef: { name: loadr-ui-auth, key: username } }
            - name: LOADR_UI_PASSWORD
              valueFrom: { secretKeyRef: { name: loadr-ui-auth, key: password } }
          ports:
            - { name: grpc, containerPort: 7625 }
            - { name: http-ui, containerPort: 6464 }
            - { name: metrics, containerPort: 9091 }
          readinessProbe:
            httpGet: { path: /healthz, port: http-ui }
            initialDelaySeconds: 2
          resources:
            requests: { cpu: 250m, memory: 256Mi }
            limits: { cpu: "2", memory: 1Gi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: [ALL] }
---
apiVersion: v1
kind: Service
metadata:
  name: loadr-controller
  namespace: loadr
spec:
  selector: { app.kubernetes.io/name: loadr, app.kubernetes.io/component: controller }
  ports:
    - { name: grpc, port: 7625, targetPort: grpc }
    - { name: http-ui, port: 6464, targetPort: http-ui }
    - { name: metrics, port: 9091, targetPort: metrics }
---
apiVersion: v1
kind: Secret
metadata:
  name: loadr-ui-auth
  namespace: loadr
type: Opaque
stringData:
  username: admin
  password: change-me

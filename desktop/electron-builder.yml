appId: io.loadr.desktop
productName: loadr Desktop
directories:
  output: dist
  buildResources: build
# Stage the arch-matching loadr binary per pack (prevents macOS EBADARCH where a
# x64 DMG ships an arm64 binary or vice versa).
beforePack: scripts/before-pack.cjs
files:
  - out/**/*
  - package.json
# The matching-version loadr binary is staged here by scripts/stage-loadr.mjs
# before packaging and resolved at runtime (resources/bin/loadr).
extraResources:
  - from: resources/bin
    to: bin
mac:
  category: public.app-category.developer-tools
  target:
    - target: dmg
      arch: [x64, arm64]
    - target: zip
      arch: [x64, arm64]
  # Notarization runs only when APPLE_ID / APPLE_APP_SPECIFIC_PASSWORD are set;
  # otherwise the build is produced unsigned (documented in README).
win:
  target:
    - nsis
    - portable
linux:
  category: Development
  target:
    - AppImage
    - deb

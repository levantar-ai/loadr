# SQL load test: drive PostgreSQL and MySQL directly. Each request runs one
# configured query as the "request"; loadr records query latency in
# `sql_req_duration`, the number of rows returned (SELECT) or affected
# (INSERT/UPDATE/DELETE) in `sql_rows`, and any database error fails the
# request. Connections are pooled per virtual user (one live connection per VU
# per database URL), so a VU connects once and reuses it for every query.
#
# Positional parameters are bound safely by the driver: `$1, $2, ...` for
# PostgreSQL and `?` for MySQL.
#
#   loadr run examples/27-sql.yaml
name: sql
description: Parameterised SELECT/INSERT against PostgreSQL and MySQL

scenarios:
  # PostgreSQL: read-mostly traffic with an occasional write.
  postgres_reads:
    executor: constant-vus
    vus: 10
    duration: 30s
    flow:
      - request:
          name: pg list products
          url: postgres://loadr:loadr@db.example.com:5432/loadr
          sql:
            query: SELECT id, name, price FROM products WHERE price < $1 ORDER BY price
            params: ["50"]
          checks:
            - { type: status, equals: 0 }                 # 0 = no DB error
            - { type: duration, name: query is fast, max: 250ms }
      - request:
          name: pg lookup by id
          url: postgres://loadr:loadr@db.example.com:5432/loadr
          sql:
            query: SELECT name FROM products WHERE id = $1
            params: ["${vu}"]
          checks:
            - { type: status, equals: 0 }
      - request:
          name: pg insert order
          url: postgres://loadr:loadr@db.example.com:5432/loadr
          sql:
            query: INSERT INTO products (name, price, stock) VALUES ($1, $2, $3)
            params: ["vu-${vu}-item", "1.23", "5"]
          assert:
            - { type: status, equals: 0 }

  # MySQL: the same workload over the MySQL wire protocol (note `?` params).
  mysql_reads:
    executor: constant-arrival-rate
    rate: 100
    duration: 30s
    pre_allocated_vus: 10
    max_vus: 40
    flow:
      - request:
          name: my count products
          url: mysql://loadr:loadr@db.example.com:3306/loadr
          sql:
            query: SELECT COUNT(*) AS n FROM products WHERE stock > ?
            params: ["0"]
          checks:
            - { type: status, equals: 0 }
            - { type: duration, name: query is fast, max: 250ms }
      - request:
          name: my top products
          url: mysql://loadr:loadr@db.example.com:3306/loadr
          sql:
            query: SELECT name, price FROM products ORDER BY price DESC LIMIT 3
          assert:
            - { type: status, equals: 0 }

thresholds:
  checks: [ "rate>0.99" ]
  sql_req_duration: [ "p(95)<300ms" ]

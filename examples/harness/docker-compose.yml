# Real backend services for running the loadr examples end-to-end.
#   docker compose -f examples/harness/docker-compose.yml up -d --build
# Used by scripts/run-examples.sh. Real products where one exists (Redis,
# go-httpbin), real protocol stacks elsewhere (grpcio + reflection, the
# websockets library, asyncio sockets).
services:
  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]

  postgres:                     # real PostgreSQL — sql:// (postgres) examples
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: loadr
      POSTGRES_PASSWORD: loadr
      POSTGRES_DB: loadr
    ports: ["5432:5432"]
    volumes:
      - ./sql/postgres-init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U loadr -d loadr"]
      interval: 2s
      timeout: 3s
      retries: 20

  mysql:                        # real MySQL — sql:// (mysql) examples
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: loadr
      MYSQL_DATABASE: loadr
      MYSQL_USER: loadr
      MYSQL_PASSWORD: loadr
    ports: ["3306:3306"]
    volumes:
      - ./sql/mysql-init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uloadr -ploadr --silent"]
      interval: 3s
      timeout: 5s
      retries: 30

  mongo:                        # real MongoDB — mongodb:// (loadr-plugin-mongo) examples
    image: mongo:7
    environment:
      # Root creds enable auth; the init script then creates a `loadr` user on
      # the `loadr` db so `mongodb://loadr:loadr@host/loadr` authenticates.
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: root
      MONGO_INITDB_DATABASE: loadr
    ports: ["27017:27017"]
    volumes:
      - ./mongo/init.js:/docker-entrypoint-initdb.d/init.js:ro
    healthcheck:
      test: ["CMD", "mongosh", "-u", "root", "-p", "root", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 3s
      timeout: 5s
      retries: 30

  kafka:                        # real Apache Kafka (KRaft, no ZooKeeper) — kafka:// (loadr-plugin-kafka)
    image: apache/kafka:3.8.0
    # Single-node KRaft: the broker is also the controller. We advertise
    # 127.0.0.1:9092 so a loadr client on the host (and the init container, which
    # shares the host network) can reach the broker via the address the broker
    # hands back during metadata discovery.
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://127.0.0.1:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    ports: ["9092:9092"]
    healthcheck:
      # Broker is ready once it answers an API-versions request on 9092.
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server 127.0.0.1:9092 >/dev/null 2>&1"]
      interval: 3s
      timeout: 5s
      retries: 40

  kafka-init:                   # one-shot: create the demo topic the example uses
    image: apache/kafka:3.8.0
    # Share the host network so 127.0.0.1:9092 (the broker's advertised address)
    # resolves to the published broker port.
    network_mode: host
    depends_on:
      kafka:
        condition: service_healthy
    command: >
      /opt/kafka/bin/kafka-topics.sh
      --bootstrap-server 127.0.0.1:9092
      --create --if-not-exists
      --topic loadr-demo
      --partitions 1
      --replication-factor 1
    restart: "no"
  elasticsearch:                # real Elasticsearch — elasticsearch:// (loadr-plugin-elasticsearch) examples
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
    environment:
      # Single-node dev mode with security off so the plugin can talk plain
      # http://host:9200 with no certs/auth. Cap the heap so CI doesn't OOM —
      # ES otherwise grabs a large fraction of host memory.
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports: ["9200:9200"]
    healthcheck:
      # ES is slow to start; poll the cluster health endpoint until it answers.
      test: ["CMD-SHELL", "curl -fsS http://localhost:9200/_cluster/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 40
      start_period: 30s

  httpbin:                      # real HTTP service (go-httpbin) — httpbin-style examples
    image: mccutchen/go-httpbin
    ports: ["8080:8080"]

  demoapp:                      # real HTTP app implementing the examples' endpoints
    build: ./demoapp
    ports: ["8085:8085"]

  greeter:                      # real gRPC (grpcio) helloworld.Greeter + reflection
    build: ./greeter
    ports: ["50051:50051"]

  echo:                         # real WS / SSE / TCP / UDP
    build: ./echo
    ports:
      - "8081:8081"
      - "8082:8082"
      - "7000:7000"
      - "8125:8125/udp"

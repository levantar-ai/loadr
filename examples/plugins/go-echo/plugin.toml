[plugin]
name = "goecho"
version = "0.1.0"
kind = "protocol"
type = "native"
# Optional ABI hint. The host also auto-detects the C ABI by probing for the
# `loadr_plugin_abi_version` symbol, so this key is not strictly required.
abi = "c"
entry = "libloadr_plugin_goecho.so"
description = "Echo protocol plugin written in Go (C-ABI)"
schemes = ["goecho"]

[plugin]
name = "aws-sigv4"
version = "0.1.0"
kind = "service"
type = "native"
entry = "libloadr_plugin_aws_sigv4.so"
description = "Pure-Rust AWS SigV4 request signer (canonical request + Authorization header)"

# Signer configuration. This is a service plugin in the *auth & signers* role:
# it has the native start/stop lifecycle, but instead of binding an endpoint or
# polling on a timer it is invoked per-request through the signer hook. The host
# calls `start(config_json)` with the request to sign (scope + method + url [+
# headers/body]) and receives back the AWS headers to stamp on the outgoing
# request. No key material is ever put in the plan.
#
# The keys below are DEFAULTS merged under each request's `sign:` `config:`
# block; `region`/`service` normally come from that per-request block.
[config]
# AWS region the signature is scoped to. Falls back to $AWS_REGION when unset.
region = ""
# AWS service the signature is scoped to — s3, execute-api, dynamodb, lambda…
# Required: it must match the endpoint being called.
service = ""
# When true, sign with the `UNSIGNED-PAYLOAD` content hash instead of the
# SHA-256 of the body (useful for large or streamed S3 bodies).
unsigned_payload = false

# Credentials are NEVER read from this block in production: they come from the
# standard AWS environment chain — AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY and
# AWS_SESSION_TOKEN (for temporary/STS credentials) — supplied via `aws-vault
# exec` or your usual credential helper. They are redacted from logs and exports.

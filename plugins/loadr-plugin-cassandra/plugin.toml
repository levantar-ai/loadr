[plugin]
name = "cassandra"
version = "1.0.0"
kind = "protocol"
type = "native"
entry = "libloadr_plugin_cassandra.so"
description = "Cassandra / ScyllaDB (CQL v4) protocol: one QUERY per request over an internal per-target connection pool"
# URL scheme this protocol plugin serves. The host maps a request URL scheme
# (e.g. `cql://host:9042/keyspace`) to this plugin once installed, so a test can
# target Cassandra or ScyllaDB without an explicit `protocol:`. Connection
# details (host, port and the session keyspace) all come from the request URL.
schemes = ["cql"]

# No required configuration. Connection details come from the request URL and
# the per-request `plugin:` block (`cql.query`, `cql.params`, `cql.consistency`).
[config]

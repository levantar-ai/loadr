[plugin]
name = "cloudwatch"
version = "1.0.0"
kind = "output"
type = "native"
entry = "libloadr_plugin_cloudwatch.so"
description = "Batches snapshot series into AWS CloudWatch PutMetricData over SigV4-signed HTTPS"

# Defaults handed to the plugin's `start` as JSON, merged with the per-plan
# `config:` overrides. Credentials are NOT set here: they are resolved from the
# standard AWS environment chain (AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY /
# AWS_SESSION_TOKEN). Keep them out of the plan file.
[config]
# CloudWatch namespace every metric is published under.
namespace = "loadr"
# AWS region whose monitoring endpoint receives the data. Falls back to the
# AWS_REGION environment variable when omitted; one of the two is required.
# region = "eu-west-2"
# Extra dimensions attached to every metric, e.g. { env = "staging" }.
# dimensions = {}
# Max metric data points per PutMetricData call (CloudWatch's hard limit is
# 1000); a snapshot with more series is split across several requests.
batch_size = 1000

[plugin]
name = "data-cleanup"
version = "0.1.0"
kind = "service"
type = "native"
entry = "libloadr_plugin_data_cleanup.so"
description = "Tracks the resources a run creates and deletes them at run end"

# Service configuration. `strategy` selects the cleanup mechanism; the remaining
# keys depend on it. The service binds a local line endpoint (see `bind`) and
# `start()` returns its bound address; every id (or absolute URL) a VU writes to
# that endpoint is buffered in an in-memory registry. Nothing is deleted during
# the run — when `stop()` runs, after the last VU retires, the service walks the
# registry and issues one cleanup call per resource.
[config]
# Cleanup mechanism: "http-delete" (issue HTTP DELETEs) or "sql" (issue SQL
# DELETEs). An unknown value fails start() so the plan is rejected up front.
strategy = "http-delete"

# --- strategy = "http-delete" ------------------------------------------------
# Base URL a tracked id is appended to: a bare id `42` is deleted as
# `DELETE <base>/42`. A tracked value that is itself an absolute http(s):// URL
# is deleted as-is, ignoring `base`. Required for `http-delete`.
base = "https://api.example.com/v1/orders"
# Headers attached to every DELETE — typically Authorization. Pull secrets from
# ${env.…} / ${secrets.…}.
# headers = { Authorization = "Bearer ${env.API_TOKEN}" }

# --- strategy = "sql" --------------------------------------------------------
# Database connection URL (`postgres://…` or `mysql://…`). Required for `sql`.
# url = "postgres://loadtest@db.example.com/app"
# Table a tracked key is deleted from. Required for `sql`.
# table = "orders"
# Primary-key column matched in `DELETE FROM <table> WHERE <key> = $1`.
# key = "id"

# --- common ------------------------------------------------------------------
# How many cleanup calls run in parallel from stop().
concurrency = 8
# Keep deleting the remaining resources when one delete fails. `false` stops at
# the first failure. Either way, failures are counted.
continue_on_error = true
# Local address the tracking endpoint binds to. Port 0 = ephemeral; the bound
# address is returned from start().
bind = "127.0.0.1:0"

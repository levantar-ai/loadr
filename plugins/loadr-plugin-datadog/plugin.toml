[plugin]
name = "datadog"
version = "1.0.0"
kind = "output"
type = "native"
entry = "libloadr_plugin_datadog.so"
description = "Batches loadr snapshot series into the Datadog v2 series HTTP API keyed by an API key"

# Defaults handed to the plugin's `start` as JSON, merged with the per-plan
# `config:` overrides. `api_key` is required and is normally supplied per plan
# (e.g. `api_key: ${env:DD_API_KEY}`), never committed here.
[config]
api_key = ""
# Datadog site. The endpoint is `https://api.<site>/api/v2/series`; set `url`
# to override the full endpoint (e.g. an internal proxy).
site = "datadoghq.com"
# Metric-name prefix prepended to every loadr metric.
prefix = "loadr."
# Flush when this many series accumulate, or every `flush_interval_secs`.
batch_size = 1000
flush_interval_secs = 15
# Per-request timeout and 5xx retry budget.
timeout_ms = 10000
max_retries = 3

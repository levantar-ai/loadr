[plugin]
name = "db-seeder"
version = "1.0.0"
kind = "service"
type = "native"
entry = "libloadr_plugin_db_seeder.so"
description = "Runs setup SQL before a run and teardown SQL after, for a known fixture state per run"

# Service configuration. The service connects with `url` (a postgres:// or
# mysql:// URL), runs the `setup` scripts once in `start()` before any VU begins,
# and runs the `teardown` scripts once in `stop()` after the run ends. Each
# script entry is either a path to a `.sql` file (relative to `dir`) or an inline
# SQL string. Only `url` is required.
[config]
# postgres:// or mysql:// connection URL. Pull it from ${env.DATABASE_URL} so
# credentials stay out of the plan; the URL is redacted from logs.
# url = "postgres://loadr:loadr@db.example.com:5432/loadr"
# Scripts run once, in order, before any VU begins (paths or inline SQL).
# setup = ["sql/schema.sql", "sql/seed.sql"]
# Scripts run once, in order, after the run ends (best-effort).
# teardown = ["sql/clean.sql"]
# What a failing setup statement does: "abort" (default) fails start() so the run
# never begins; "continue" logs the error and proceeds to the next statement.
# on_setup_error = "abort"
# Wrap each script in a single transaction (all-or-nothing). Default: false.
# transaction = false
# Directory the relative script paths are resolved against. Default: "." (cwd).
# dir = "."

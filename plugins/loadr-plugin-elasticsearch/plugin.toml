[plugin]
name = "elasticsearch"
version = "1.0.0"
kind = "protocol"
type = "native"
entry = "libloadr_plugin_elasticsearch.so"
description = "Elasticsearch protocol: index/get/search/bulk over the HTTP/JSON REST API"
# URL scheme(s) this protocol plugin serves. The host maps a request URL scheme
# (e.g. `elasticsearch://host:9200`) to this plugin once installed, so a test
# can target Elasticsearch without an explicit `protocol:`. `es://` is an alias.
# Both schemes are mapped onto plain `http://` internally; use a `http(s)://`
# URL directly if you prefer (also served).
schemes = ["elasticsearch", "es"]

# No required configuration. Connection details (host, port, basic-auth) come
# from the request URL.
[config]

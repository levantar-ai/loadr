[plugin]
name = "faker-gen"
version = "1.0.0"
kind = "service"
type = "native"
entry = "libloadr_plugin_faker_gen.so"
description = "Seeded, pure-Rust fake-data generator: materialises CSV rows a CSV feeder pulls from"

# Default configuration. Overridden per-plan by the `plugins:` entry `config`.
# `path`    — the CSV file to (re)generate before the run; point a CSV feeder at it.
# `rows`    — how many rows to generate (header excluded).
# `seed`    — fixed u64 for reproducible data; omit for a fresh random seed each run.
# `cleanup` — delete the generated file on service stop (teardown).
# Columns default to a user schema when `columns` is not given.
[config]
path = "faker-data.csv"
rows = 1000
cleanup = false

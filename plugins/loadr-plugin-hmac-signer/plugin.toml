[plugin]
name = "hmac-signer"
version = "0.1.0"
kind = "service"
type = "native"
entry = "libloadr_plugin_hmac_signer.so"
description = "Pure-Rust HMAC (SHA-256/512) request signer over a configurable canonical string"

# Service configuration. Only `secret` is required. The service binds a local
# line endpoint (see `bind`) and `start()` returns its bound address; for every
# request line a VU sends (a JSON object of request fields, or an already
# rendered canonical string) the service replies with a JSON line
# `{"header":"…","value":"…"}` carrying the header name and the HMAC signature
# to stamp on the request. The signing is pure Rust (`hmac` + `sha2`) — no
# OpenSSL and no C dependency.
[config]
# Shared secret keying the HMAC. Required and non-empty; pass it from the
# environment (e.g. `${PARTNER_SECRET}`) rather than committing it to the plan.
secret = ""
# HMAC hash: "sha256" (HMAC-SHA256, default) or "sha512" (HMAC-SHA512).
algo = "sha256"
# Name of the request header the signature is written to.
header = "x-signature"
# The canonical string the HMAC is taken over. `{method}`, `{path}`, `{url}`,
# `{body}` and `{timestamp}` placeholders are substituted per request; any
# surrounding literal text is signed verbatim.
template = "{method}{path}{body}"
# How the signature bytes are encoded into the header value: "hex" (lowercase,
# default) or "base64".
encoding = "hex"
# Literal text prepended to the encoded signature — e.g. "sha256=" for a
# GitHub-style `x-hub-signature-256` header.
prefix = ""
# Local address the signer endpoint binds to. Port 0 = ephemeral; start()
# returns the actual bound address.
bind = "127.0.0.1:0"

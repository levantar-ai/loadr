[plugin]
name = "json-schema"
version = "0.1.0"
kind = "assertion"
type = "wasm"
entry = "loadr_plugin_json_schema.wasm"
description = "Validates the JSON response body against a JSON Schema (pragmatic subset)"

[config]
schema = { type = "object", required = ["id"], properties = { id = { type = "integer", minimum = 1 }, name = { type = "string", minLength = 1 } } }

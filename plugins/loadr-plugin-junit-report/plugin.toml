[plugin]
name = "junit-report"
version = "1.0.0"
kind = "output"
type = "native"
entry = "libloadr_plugin_junit_report.so"
description = "Maps checks and thresholds to JUnit testcases and writes junit.xml"

# Output configuration. The object under `config` is handed to the plugin's
# `start()` as JSON. `path` is opened (and truncated) in `start`; the buffered
# `<testsuite>` is rendered to it in `finish`. An empty `path` fails `start`.
[config]
# Where the JUnit report is written. `${env.…}` and other interpolation resolve
# before the config reaches the plugin, so a per-branch filename can flow in
# from the environment.
path = "junit.xml"

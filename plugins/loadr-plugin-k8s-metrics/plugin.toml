[plugin]
name = "k8s-metrics"
version = "0.1.0"
kind = "service"
type = "native"
entry = "libloadr_plugin_k8s_metrics.so"
description = "Polls metrics.k8s.io for pod CPU/memory and emits system-metric samples aligned to the run timeline"

# Service configuration. Every key is optional. On `start()` the collector spins
# up a background poller that scrapes the Kubernetes metrics API on `interval_ms`
# and accumulates a system-metric series per matched pod
# (`k8s_pod_cpu_cores`, `k8s_pod_mem_bytes`, `k8s_scrapes`); it binds a tiny
# local endpoint (see `bind`) and `start()` returns its bound address. A slow or
# unreachable scrape is counted, never fatal — the affected series just shows a
# gap. Credentials come from the mounted service-account token/CA by default.
[config]
# Kubernetes API server base URL. Defaults to the in-cluster service address.
api_url = "https://kubernetes.default.svc"
# Namespace to scrape pods from.
namespace = "default"
# Label selector narrowing which pods are collected (e.g. "app=api"). Empty =
# every pod in the namespace. Passed through as the metrics API `labelSelector`.
selector = ""
# Poll period in milliseconds. Each tick is one scrape of the metrics API.
interval_ms = 5000
# Bearer token. Defaults to the projected service-account token at
# /var/run/secrets/kubernetes.io/serviceaccount/token; set via ${env.K8S_TOKEN}
# to run off-cluster. Redacted from logs and exports.
token = ""
# Path to the cluster CA bundle for TLS verification. Defaults to the mounted
# service-account CA when present.
ca_cert = ""
# Skip TLS verification of the API server (off-cluster testing only).
insecure = false
# Local address the collector endpoint binds to. Port 0 = ephemeral; start()
# returns the actual bound address.
bind = "127.0.0.1:0"

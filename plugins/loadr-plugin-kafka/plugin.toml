[plugin]
name = "kafka"
version = "1.0.0"
kind = "protocol"
type = "native"
entry = "libloadr_plugin_kafka.so"
description = "Apache Kafka protocol: produce/fetch via the pure-Rust rskafka client"
# URL scheme(s) this protocol plugin serves. The host maps a request URL scheme
# (e.g. `kafka://broker:9092/topic`) to this plugin once installed, so a test can
# target a Kafka broker without an explicit `protocol:`.
schemes = ["kafka"]

# No required configuration. Broker + topic come from the request URL.
[config]

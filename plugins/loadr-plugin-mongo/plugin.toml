[plugin]
name = "mongo"
version = "1.0.0"
kind = "protocol"
type = "native"
entry = "libloadr_plugin_mongo.so"
description = "MongoDB protocol: insert/find/update/delete/aggregate/command"
# URL scheme(s) this protocol plugin serves. The host maps a request URL
# scheme (e.g. `mongodb://host/db`) to this plugin once installed, so a test
# can target Mongo without an explicit `protocol:`. `mongo://` is an alias.
schemes = ["mongodb", "mongo"]

# No required configuration. Connection details come from the request URL.
[config]

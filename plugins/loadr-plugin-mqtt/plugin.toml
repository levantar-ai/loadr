[plugin]
name = "mqtt"
version = "1.0.0"
kind = "protocol"
type = "native"
entry = "libloadr_plugin_mqtt.so"
description = "MQTT 3.1.1: publish and subscribe over an internal per-server connection pool"
# URL scheme this protocol plugin serves. The host maps a request URL scheme
# (e.g. `mqtt://broker:1883`) to this plugin once installed, so a test can
# target MQTT without an explicit `protocol:`. Connection details (host, port
# and optional user:password credentials) all come from the request URL.
#
# Only the plaintext `mqtt` scheme is served: the control packets are
# hand-rolled over a raw `std::net::TcpStream` with no TLS stack, so `mqtts`
# (TLS on 8883) is intentionally not offered by this build.
schemes = ["mqtt"]

# No required configuration. Connection details come from the request URL and
# the per-request `plugin:` block (`operation`, `topic`, `qos`, `body`,
# `retain`, `timeout`).
[config]

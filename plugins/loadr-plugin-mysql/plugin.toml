[plugin]
name = "mysql"
version = "1.0.0"
kind = "protocol"
type = "native"
entry = "libloadr_plugin_mysql.so"
description = "MySQL protocol: queries via sqlx with an internal per-URI pool"
# URL scheme(s) this protocol plugin serves. The host maps a request URL
# scheme (e.g. `mysql://host/db`) to this plugin once installed, so a test can
# target a database without an explicit `protocol:`.
schemes = ["mysql"]

# No required configuration. Connection details come from the request URL.
[config]

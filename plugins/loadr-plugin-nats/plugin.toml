[plugin]
name = "nats"
version = "1.0.0"
kind = "protocol"
type = "native"
entry = "libloadr_plugin_nats.so"
description = "NATS protocol: publish and request/reply over an internal per-server connection pool"
# URL scheme this protocol plugin serves. The host maps a request URL scheme
# (e.g. `nats://host:4222`) to this plugin once installed, so a test can target
# NATS without an explicit `protocol:`. Connection details (host, port and
# optional user:password credentials) all come from the request URL.
schemes = ["nats"]

# No required configuration. Connection details come from the request URL and
# the per-request `plugin:` block (`operation`, `subject`, `body`, `reply_to`).
[config]

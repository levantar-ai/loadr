[plugin]
name = "oauth2-minter"
version = "0.1.0"
kind = "service"
type = "native"
entry = "libloadr_plugin_oauth2_minter.so"
description = "Mints and auto-refreshes an OAuth2 bearer token shared by every VU"

# Service configuration. `token_url`, `client_id` and `client_secret` are
# required; everything else has a default. On `start()` the service runs the
# grant once (failing fast on a bad URL or credential), caches the bearer token,
# and binds a tiny local line endpoint — `start()` returns its bound address.
# Every VU that reads a line from that endpoint gets the current shared token; a
# background task re-mints it before it expires, so the fleet always attaches a
# live token without any VU making its own auth round-trip.
[config]
# OAuth2 token endpoint the grant is POSTed to. Must be http(s)://…. Required.
token_url = "https://id.example.com/oauth2/token"
# OAuth2 client identifier. Required.
client_id = "my-client"
# OAuth2 client secret. Pull it from ${env.…}/${secrets.…}, never inline it.
client_secret = "change-me"
# Grant to run: "client_credentials" (default) or "refresh_token".
grant_type = "client_credentials"
# Required when grant_type = "refresh_token".
# refresh_token = "…"
# Space-separated OAuth2 scopes. Omit to take the endpoint's default.
# scope = "api.read api.write"
# Optional audience parameter (e.g. Auth0).
# audience = "https://api.example.com"
# How credentials are presented: "body" (form fields, default) or "basic"
# (HTTP Basic Authorization header).
auth_style = "body"
# Refresh this long before the token's expires_in. Number of seconds or a
# duration string like "30s" / "5m". Default: 30s.
refresh_skew = "30s"
# Fallback token lifetime used when the endpoint omits expires_in. Default 1h.
default_ttl = "1h"
# Per-grant HTTP timeout in milliseconds.
timeout_ms = 10000
# Local address the token endpoint binds to. Port 0 = ephemeral; start() returns
# the actual bound address.
bind = "127.0.0.1:0"

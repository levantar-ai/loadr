[plugin]
name = "openapi-contract"
version = "0.1.0"
kind = "assertion"
type = "wasm"
entry = "loadr_plugin_openapi_contract.wasm"
description = "Asserts the response status and body conform to an OpenAPI operation schema (pragmatic JSON-subset validation)"

[config]
status = 200
schema = { type = "object", required = ["id", "name"], properties = { id = { type = "integer", minimum = 1 }, name = { type = "string", minLength = 1 }, email = { type = "string", nullable = true }, tags = { type = "array", items = { type = "string" } } } }

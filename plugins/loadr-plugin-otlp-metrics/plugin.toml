[plugin]
name = "otlp-metrics"
version = "1.0.0"
kind = "output"
type = "native"
entry = "libloadr_plugin_otlp_metrics.so"
description = "Encodes snapshot series as OTLP metrics (protobuf/JSON over OTLP/HTTP) and posts them to an OpenTelemetry collector"

# Defaults handed to the plugin's `start` as JSON, merged with the per-plan
# `config:` overrides. `endpoint` is required and is normally supplied per plan
# (e.g. `endpoint: ${env.OTLP_ENDPOINT}`).
[config]
# Base URL of the OTLP/HTTP collector, e.g. "http://collector:4318". The plugin
# appends "/v1/metrics" unless the URL already ends in that path. Point at the
# OTLP/HTTP port (4318), NOT the 4317 gRPC port. Required.
endpoint = "http://127.0.0.1:4318"
# Wire encoding: "protobuf" (default, Content-Type application/x-protobuf) or
# "json" (Content-Type application/json). Both are valid OTLP/HTTP.
encoding = "protobuf"
# Value of the `service.name` resource attribute on every exported metric.
service_name = "loadr"
# Per-request timeout and 5xx retry budget (exponential backoff).
timeout_ms = 10000
max_retries = 3

# Extra OTLP resource attributes attached to every metric (merged after
# `service.name`). Uncomment and add key/value pairs as needed.
# [config.resource_attributes]
# deployment.environment = "staging"

# Extra HTTP headers sent on every export — typically an auth header for a
# hosted collector. Set from the environment, never hard-coded.
# [config.headers]
# Authorization = "Bearer ${env.OTLP_TOKEN}"

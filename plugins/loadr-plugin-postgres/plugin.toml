[plugin]
name = "postgres"
version = "1.0.0"
kind = "protocol"
type = "native"
entry = "libloadr_plugin_postgres.so"
description = "PostgreSQL protocol: queries via sqlx with an internal per-URI pool"
# URL scheme(s) this protocol plugin serves. The host maps a request URL
# scheme (e.g. `postgres://host/db`) to this plugin once installed, so a test
# can target a database without an explicit `protocol:`. `postgresql` is the
# standard alias.
schemes = ["postgres", "postgresql"]

# No required configuration. Connection details come from the request URL.
[config]

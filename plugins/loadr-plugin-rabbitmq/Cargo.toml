[package]
name = "loadr-plugin-rabbitmq"
description = "Native protocol plugin: adds RabbitMQ (amqp://) as a loadr load-test target"
version.workspace = true
edition.workspace = true
license-file.workspace = true
repository.workspace = true
publish = false

[lib]
name = "loadr_plugin_rabbitmq"
crate-type = ["cdylib"]

[dependencies]
loadr-plugin-api = { path = "../../crates/loadr-plugin-api" }
abi_stable = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
url = { workspace = true }
# The AMQP 0.9.1 stack lives ONLY in this plugin crate, never in loadr core.
# `lapin` is pure Rust (no C / system-lib deps); we drive it on tokio via the
# `tokio-executor-trait` / `tokio-reactor-trait` integrations at runtime
# (see `ConnectionProperties` in lib.rs). TLS (`amqps://`) uses rustls only —
# `native-tls`/`openssl` are disabled so portable cross-compiled cdylib builds
# never pull in OpenSSL.
lapin = { version = "2", default-features = false, features = ["rustls"] }
tokio-executor-trait = "2"
tokio-reactor-trait = "1"
once_cell = "1"
futures-util = "0.3"
tokio = { version = "1.52", features = ["rt-multi-thread", "time"] }

[plugin]
name = "rabbitmq"
version = "1.0.0"
kind = "protocol"
type = "native"
entry = "libloadr_plugin_rabbitmq.so"
description = "RabbitMQ (AMQP 0.9.1) protocol: publish/get messages"
# URL scheme(s) this protocol plugin serves. The host maps a request URL
# scheme (e.g. `amqp://host/vhost`) to this plugin once installed, so a test
# can target RabbitMQ without an explicit `protocol:`. `amqps://` is the
# TLS variant; `rabbitmq://` is an alias.
schemes = ["amqp", "amqps", "rabbitmq"]

# No required configuration. Connection details come from the request URL.
[config]

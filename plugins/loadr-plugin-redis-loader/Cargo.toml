[package]
name = "loadr-plugin-redis-loader"
description = "Native service plugin: a distributed shared data feeder backed by a Redis list or stream"
version.workspace = true
edition.workspace = true
license-file.workspace = true
repository.workspace = true
publish = false

[lib]
name = "loadr_plugin_redis_loader"
crate-type = ["cdylib"]

[dependencies]
loadr-plugin-api = { path = "../../crates/loadr-plugin-api" }
abi_stable = { workspace = true }
serde_json = { workspace = true }
url = { workspace = true }
# The feeder speaks RESP directly over a blocking `std::net::TcpStream` and
# serves values to VUs over a small `std::net` line endpoint — a pure-Rust,
# std-only stack with no C deps (deliberately no `redis` crate, no OpenSSL and
# no async runtime), so this cdylib cross-compiles cleanly for every release
# target.

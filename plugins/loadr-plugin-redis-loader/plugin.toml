[plugin]
name = "redis-loader"
version = "1.0.0"
kind = "service"
type = "native"
entry = "libloadr_plugin_redis_loader.so"
description = "Distributed shared data feeder: hands VUs values popped from a Redis list or read from a stream"

# Service configuration. All keys are optional except `key`; connection details
# come from `url`. The service binds a local line endpoint (see `bind`) and
# `start()` returns its bound address; every VU that reads a line from that
# endpoint gets the next shared value. Because the backing list/stream lives in
# Redis, the feed is shared across every worker pointed at the same server,
# giving a distributed, exactly-once (list) or fan-in (stream) feeder.
[config]
# Redis target, e.g. "redis://127.0.0.1:6379" or "redis://host:6379/2".
url = "redis://127.0.0.1:6379"
# List or stream key to feed from. Required.
key = "loadr:feed"
# "list" (default) pops values; "stream" reads entries.
source = "list"
# "exhaust" (default): stop feeding when the source is empty.
# "block":   wait up to `block_ms` for a value (BLPOP / XREAD BLOCK).
# "cycle":   rotate list values forever (LMOVE key key LEFT RIGHT).
mode = "exhaust"
# Local address the feeder endpoint binds to. Use port 0 for an ephemeral port;
# start() returns the actual bound address.
bind = "127.0.0.1:0"
# Block timeout in milliseconds for `mode = "block"`.
block_ms = 5000
# Max entries to pull per stream read (`source = "stream"`).
count = 16

[package]
name = "loadr-plugin-redis"
description = "Native protocol plugin: adds Redis (redis://) as a loadr load-test target"
version.workspace = true
edition.workspace = true
license-file.workspace = true
repository.workspace = true
publish = false

[lib]
name = "loadr_plugin_redis"
crate-type = ["cdylib"]

[dependencies]
loadr-plugin-api = { path = "../../crates/loadr-plugin-api" }
abi_stable = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
url = { workspace = true }
once_cell = "1"
# The Redis (RESP) protocol is spoken directly over a raw TCP connection, so the
# only runtime dependency is tokio's networking — a pure-Rust stack with no C
# deps, so this cdylib cross-compiles cleanly for every release target. There is
# deliberately no `redis` crate (and thus no native-tls/OpenSSL pull-in).
tokio = { version = "1.52", features = ["rt-multi-thread", "net", "io-util", "time"] }

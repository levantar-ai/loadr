[plugin]
name = "redis"
version = "1.0.0"
kind = "protocol"
type = "native"
entry = "libloadr_plugin_redis.so"
description = "Redis (RESP) protocol: commands over an internal per-URI connection pool"
# URL scheme(s) this protocol plugin serves. The host maps a request URL
# scheme (e.g. `redis://host:6379`) to this plugin once installed, so a test
# can target Redis without an explicit `protocol:`. `rediss://` is the TLS
# alias (handled the same way; connection details come from the URL).
schemes = ["redis", "rediss"]

# No required configuration. Connection details come from the request URL.
[config]

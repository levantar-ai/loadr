[plugin]
name = "s3-archive"
version = "1.0.0"
kind = "output"
type = "native"
entry = "libloadr_plugin_s3_archive.so"
description = "Buffers the run report and uploads it gzip-compressed to S3 (SigV4)"

# Output configuration. `bucket` and `region` are required; everything else has
# a default. The plugin follows the start / on_snapshot / finish lifecycle: it
# validates this config and resolves AWS credentials at `start`, buffers each
# one-second snapshot locally during the run (no per-second network traffic),
# then in `finish` gzip-compresses the accumulated report and uploads it with a
# single SigV4-signed HTTPS PUT to `s3://{bucket}/{key_prefix}{run_id}.json.gz`.
[config]
# S3 bucket the compressed report is uploaded to. Required.
bucket = "reports"
# Prefix prepended to the generated object key; the run's `run_id` and a
# `.json.gz` suffix complete it (e.g. "runs/" -> "runs/<run_id>.json.gz").
key_prefix = "runs/"
# Bucket region — the request endpoint and the SigV4 signing region. Required.
region = "eu-west-2"
# Override the S3 endpoint for S3-compatible stores (MinIO, VPC endpoints).
# Defaults to https://{bucket}.s3.{region}.amazonaws.com (virtual-hosted style).
# endpoint = "http://localhost:9000"
# Compression applied before upload: "gzip" (default) or "none". With "none" the
# raw JSON is uploaded and the object key drops the ".gz" suffix.
compression = "gzip"

# Credentials for the SigV4 signature come from the standard AWS environment
# variables — AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY and (when present)
# AWS_SESSION_TOKEN. Keep them out of the plan file; supply them through the
# environment (or `aws-vault exec ...`) as usual.

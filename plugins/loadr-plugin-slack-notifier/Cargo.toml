[package]
name = "loadr-plugin-slack-notifier"
description = "Native output plugin: posts a run summary and threshold verdict to a Slack incoming webhook"
version.workspace = true
edition.workspace = true
license-file.workspace = true
repository.workspace = true
publish = false

[lib]
name = "loadr_plugin_slack_notifier"
crate-type = ["cdylib"]

[dependencies]
loadr-plugin-api = { path = "../../crates/loadr-plugin-api" }
abi_stable = { workspace = true }
serde_json = { workspace = true }
once_cell = "1"
tokio = { version = "1.52", features = ["rt-multi-thread", "time"] }
# A Slack incoming webhook is a plain HTTPS/JSON POST, so this plugin sends the
# message directly over the project's existing hyper + hyper-rustls stack rather
# than pulling in a Slack SDK. `hyper-rustls` selects `ring` + webpki roots —
# pure-Rust TLS, no system OpenSSL — so the cdylib cross-compiles cleanly for
# every release target.
hyper = { workspace = true }
hyper-util = { workspace = true }
hyper-rustls = { workspace = true }
http-body-util = { workspace = true }
bytes = { workspace = true }

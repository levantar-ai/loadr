[plugin]
name = "slack-notifier"
version = "1.0.0"
kind = "output"
type = "native"
entry = "libloadr_plugin_slack_notifier.so"
description = "Posts a run summary and threshold verdict to a Slack incoming webhook"

# Defaults handed to the plugin's `start` as JSON, merged with the per-plan
# `config:` overrides. `webhook_url` is required and is normally supplied per
# plan from the environment (e.g. `webhook_url: ${env.SLACK_WEBHOOK_URL}`),
# never committed here — an incoming webhook URL is a credential.
[config]
# Slack incoming webhook URL, e.g. "https://hooks.slack.com/services/T00/B00/xxx".
# A missing or empty value fails `start()`, so the plan is rejected before the
# run begins rather than silently dropping the notification.
webhook_url = ""

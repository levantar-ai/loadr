[package]
name = "loadr-plugin-sql-feeder"
description = "Native service plugin: runs a SELECT once at startup and exposes the rows as a JSON feeder for the run"
version.workspace = true
edition.workspace = true
license-file.workspace = true
repository.workspace = true
publish = false

[lib]
name = "loadr_plugin_sql_feeder"
crate-type = ["cdylib"]

[dependencies]
loadr-plugin-api = { path = "../../crates/loadr-plugin-api" }
abi_stable = { workspace = true }
serde_json = { workspace = true }
once_cell = "1"
tokio = { version = "1.52", features = ["rt-multi-thread"] }
# The heavy `sqlx` driver lives ONLY in this plugin crate, never in loadr core.
# The `any` feature is enabled so a single plugin can serve both PostgreSQL and
# MySQL connection URLs (the driver is chosen from the URL scheme at connect
# time). Enabling `mysql` pulls in its transitive `rsa` dep (RUSTSEC-2023-0071),
# confined to this plugin crate. `rustls` TLS avoids a system OpenSSL dependency
# for portable cdylib builds.
sqlx = { version = "0.8", default-features = false, features = [
    "runtime-tokio-rustls",
    "any",
    "postgres",
    "mysql",
    "tls-rustls-ring",
] }

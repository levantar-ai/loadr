[plugin]
name = "sql-feeder"
version = "1.0.0"
kind = "service"
type = "native"
entry = "libloadr_plugin_sql_feeder.so"
description = "Runs a SELECT once at startup and writes the rows as a JSON feeder file for the run"

# Required configuration. The service connects with `url`, runs `query`, and
# writes the result set (an array of row objects) to `output` as a JSON feeder
# file that a `data:` source of `type: json` then reads.
[config]
# url    = "postgres://user:pass@host:5432/db"   # postgres:// or mysql:// URL
# query  = "SELECT id, email FROM users LIMIT 100"
# output = "data/users-from-db.json"

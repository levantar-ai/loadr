[package]
name = "loadr-plugin-testcontainers"
description = "Native service plugin: starts declared Docker containers for the run and removes them afterwards"
version.workspace = true
edition.workspace = true
license-file.workspace = true
repository.workspace = true
publish = false

[lib]
name = "loadr_plugin_testcontainers"
crate-type = ["cdylib"]

[dependencies]
loadr-plugin-api = { path = "../../crates/loadr-plugin-api" }
abi_stable = { workspace = true }
serde_json = { workspace = true }
# The plugin talks to the Docker Engine directly over HTTP/1.1 on the
# `/var/run/docker.sock` Unix socket, hand-rolled on a blocking
# `std::os::unix::net::UnixStream` — a pure-Rust, std-only stack with no C deps
# (deliberately no `testcontainers`/Docker client crate, no OpenSSL and no async
# runtime), so this cdylib cross-compiles cleanly for every loadr release target.

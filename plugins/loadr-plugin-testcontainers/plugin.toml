[plugin]
name = "testcontainers"
version = "1.0.0"
kind = "service"
type = "native"
entry = "libloadr_plugin_testcontainers.so"
description = "Starts declared containers for the run (Docker Engine API over /var/run/docker.sock) and removes them afterwards"

# Service configuration. The only required key is `containers`; every other key
# has a default. On `start()` the plugin creates + starts each container, waits
# for its `wait` condition, and returns a JSON summary of the started containers
# and their `image -> host port` mappings. Each published port is also exported
# as an env var named `LOADR_TC_<IMAGE>_<CONTAINER_PORT>` so requests can reach
# the ephemeral host port Docker assigned. `stop()` removes every container it
# created and is idempotent.
[config]
# The containers to start. Required and non-empty.
#   containers = [ { image = "postgres:16", port = 5432, wait = "log:ready" } ]
#
# Per-container keys:
#   image  (string, required)  e.g. "postgres:16"; pulled if not present locally.
#   port   (number or array)   container port(s) to publish to an ephemeral host
#                              port; each becomes a LOADR_TC_<IMAGE>_<PORT> var.
#   wait   (string)            readiness gate: "log:<substr>", "port"/"port:<n>",
#                              or "healthy". Omit for "container is running".
#   env    (table string->str) environment variables set inside the container.
#   cmd    (array of string)   overrides the image's default command.
#   name   (string)            stable container name; auto-generated otherwise.
containers = []
# How long start() waits for ALL containers to become ready before rolling back
# and failing. Accepts seconds or a duration string ("60s", "500ms", "2m").
startup_timeout = "60s"
# Docker Engine socket. Defaults to $DOCKER_HOST (unix://... stripped) or
# /var/run/docker.sock.
# socket = "/var/run/docker.sock"

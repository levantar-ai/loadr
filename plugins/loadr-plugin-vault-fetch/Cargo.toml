[package]
name = "loadr-plugin-vault-fetch"
description = "Native service plugin: fetches KV secrets from HashiCorp Vault at run start and serves them to VUs"
version.workspace = true
edition.workspace = true
license-file.workspace = true
repository.workspace = true
publish = false

[lib]
name = "loadr_plugin_vault_fetch"
crate-type = ["cdylib"]

[dependencies]
loadr-plugin-api = { path = "../../crates/loadr-plugin-api" }
abi_stable = { workspace = true }
serde_json = { workspace = true }
url = { workspace = true }
once_cell = { workspace = true }
# The Vault HTTP API (AppRole login + KV v2 read) is plain HTTPS/JSON, so this
# plugin talks to it directly over the project's existing hyper + hyper-rustls
# stack rather than pulling in a Vault SDK or the `vault` binary. `hyper-rustls`
# selects `ring` + webpki roots — pure-Rust TLS, no system OpenSSL — so the
# cdylib cross-compiles cleanly for every release target. A single Tokio runtime
# drives the async requests; the (non-async) host thread `block_on`s each call.
hyper = { workspace = true }
hyper-util = { workspace = true }
hyper-rustls = { workspace = true }
http-body-util = { workspace = true }
bytes = { workspace = true }
tokio = { version = "1.52", features = ["rt-multi-thread", "time"] }

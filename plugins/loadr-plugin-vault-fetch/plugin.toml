[plugin]
name = "vault-fetch"
version = "0.1.0"
kind = "service"
type = "native"
entry = "libloadr_plugin_vault_fetch.so"
description = "Fetches KV secrets from Vault at run start and serves them to VUs over a local endpoint"

# Service configuration. `addr`, `path` and `auth` are required; everything else
# is optional. On `start()` the service logs in to Vault (a static token or an
# AppRole login), reads the KV secret at `path` once, and binds a local line
# endpoint (see `bind`); `start()` returns its bound address. Every VU that opens
# that endpoint and writes a field name gets that field's value back, so the
# fetched secrets are shared across the whole run without any VU reaching Vault.
[config]
# Vault API address. Must be http(s)://…; use https:// in any non-local setup.
addr = "https://127.0.0.1:8200"
# KV read path, e.g. "secret/data/app" for a KV v2 mount. Required.
path = "secret/data/app"
# Exactly one auth method. Bootstrap credentials should come from ${env.…},
# never inline in the plan:
#   auth = { token = "${env.VAULT_TOKEN}" }
# or an AppRole login:
#   auth = { approle = { role_id = "${env.VAULT_ROLE_ID}", secret_id = "${env.VAULT_SECRET_ID}" } }
auth = { token = "${env.VAULT_TOKEN}" }
# Vault Enterprise namespace, sent as the X-Vault-Namespace header (optional).
# namespace = "team-a"
# Keep the auth lease alive for the length of the run (only meaningful for an
# AppRole login that returns a renewable lease). Default: false.
renew = false
# Per-request timeout for the login and KV read. A number of seconds, or a
# string like "10s" / "500ms". Default: 10s.
timeout = "10s"
# Local address the secret endpoint binds to. Port 0 = ephemeral; the bound
# address is returned from start() and printed when the run starts.
bind = "127.0.0.1:0"

[package]
name = "loadr-plugin-webhook"
description = "Native output plugin: POSTs each snapshot and the summary as JSON to a configured HTTP endpoint"
version.workspace = true
edition.workspace = true
license-file.workspace = true
repository.workspace = true
publish = false

[lib]
name = "loadr_plugin_webhook"
crate-type = ["cdylib"]

[dependencies]
loadr-plugin-api = { path = "../../crates/loadr-plugin-api" }
abi_stable = { workspace = true }
serde_json = { workspace = true }
# The webhook transport is nothing but plain HTTP(S)/JSON, so this plugin posts
# directly over the project's existing hyper + hyper-rustls stack rather than a
# client library or message broker. `hyper-rustls` selects `ring` + webpki
# roots — pure-Rust TLS, no system OpenSSL — so the cdylib cross-compiles
# cleanly for every release target.
hyper = { workspace = true }
hyper-util = { workspace = true }
hyper-rustls = { workspace = true }
http-body-util = { workspace = true }
bytes = { workspace = true }
tokio = { version = "1.52", features = ["rt-multi-thread", "time"] }
# Optional payload signing: HMAC-SHA256 over the exact request body. Both are
# pure-Rust RustCrypto crates, so they add nothing to the TLS/build surface.
hmac = { workspace = true }
sha2 = { workspace = true }

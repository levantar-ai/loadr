[plugin]
name = "webhook"
version = "1.0.0"
kind = "output"
type = "native"
entry = "libloadr_plugin_webhook.so"
description = "POSTs each snapshot and the summary as JSON to a configured HTTP endpoint with configurable headers"

# Output configuration. `url` is required; everything else is optional. loadr
# calls `start(config)` once, hands the plugin a metric snapshot roughly once a
# second (`on_snapshot`), then the end-of-run summary (`finish`). Each is POSTed
# as a single JSON body carrying an `event` field ("snapshot" | "summary"), the
# run's `run_id`, and the payload. Delivery is bounded by `timeout` and never
# stalls the load generator; failures are counted, not fatal.
[config]
# The endpoint every snapshot and the summary are POSTed to. Must be
# `http(s)://…`; a missing or malformed URL fails start() so a typo is caught
# before the run rather than dropped silently. Required.
url = "https://hooks.example.com/loadr"
# Static headers added to every request (e.g. Authorization, an API token, a
# routing tag). `Content-Type: application/json` is always set. Values
# interpolate (`${env.…}`), so pull secrets from the environment.
# headers = { X-Source = "loadr" }
# When set, each request is signed: HMAC-SHA256(secret, body) over the exact
# JSON bytes, sent hex-encoded as the `X-Loadr-Signature` header. Unset = POST
# unsigned.
# hmac_secret = ""
# Per-request timeout. Accepts a duration string ("5s", "500ms", "1m") or a
# bare number of seconds. A request that exceeds it is abandoned and counted as
# a delivery error. Default 5s.
timeout = "5s"

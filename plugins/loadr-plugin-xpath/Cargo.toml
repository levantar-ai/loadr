# Standalone guest crate (NOT a workspace member): built for wasm32-wasip2.
[package]
name = "loadr-plugin-xpath"
version = "0.1.0"
edition = "2021"
license-file = "../../LICENSE"
publish = false

[lib]
crate-type = ["cdylib"]

[dependencies]
wit-bindgen = "0.58"
serde = { version = "1", features = ["derive"] }
serde_json = "1"

[profile.release]
lto = true
opt-level = "s"
strip = "symbols"

[workspace]
